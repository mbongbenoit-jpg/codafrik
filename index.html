<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0F">
<title>CodAfrik</title>
<style>
/* ════════════════════════════════════════════════
   RESET & TOKENS
════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:        #0A0A0F;
  --bg2:       #12121A;
  --bg3:       #1C1C28;
  --border:    rgba(255,255,255,.08);
  --border2:   rgba(255,255,255,.14);
  --text:      #F0F0F8;
  --text2:     #8888A8;
  --text3:     #5555708;
  --accent:    #6C63FF;
  --accent2:   #4F46E5;
  --green:     #10B981;
  --green2:    #065F46;
  --amber:     #F59E0B;
  --amber2:    #78350F;
  --red:       #EF4444;
  --red2:      #7F1D1D;
  --blue:      #3B82F6;
  --radius:    12px;
  --radius-sm: 8px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ════════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════════ */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.logo{font-size:16px;font-weight:700;background:linear-gradient(135deg,#6C63FF,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sync-badge{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.off{background:var(--red)}
.sync-dot.loading{background:var(--amber);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.role-bar{background:var(--bg);border-bottom:1px solid var(--border);display:flex;padding:6px;gap:4px}
.role-btn{flex:1;padding:8px 4px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;font-family:inherit}
.role-btn.active{color:#fff}
.role-btn.r-admin.active{background:var(--accent2)}
.role-btn.r-closeur.active{background:#B45309}
.role-btn.r-livreur.active{background:#065F46}

.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:11px 14px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:inherit}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.pill{background:var(--red);color:#fff;border-radius:9px;font-size:10px;padding:1px 5px;margin-left:3px}

.content{padding:12px;flex:1;max-width:720px;margin:0 auto;width:100%}

/* ════════════════════════════════════════════════
   CARDS & TABLES
════════════════════════════════════════════════ */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;flex-wrap:wrap}
.card-body{padding:14px}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;border-top:3px solid var(--accent)}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.kpi-val{font-size:22px;font-weight:700;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:2px}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* ════════════════════════════════════════════════
   STATUS BADGES
════════════════════════════════════════════════ */
.st{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.st-attente  {background:rgba(59,130,246,.15);color:#93C5FD}
.st-acloseur {background:rgba(108,99,255,.15);color:#A78BFA}
.st-appel    {background:rgba(245,158,11,.15);color:#FCD34D}
.st-confirme {background:rgba(16,185,129,.15);color:#6EE7B7}
.st-alivreur {background:rgba(251,146,60,.15);color:#FDBA74}
.st-livraison{background:rgba(245,158,11,.15);color:#FCD34D}
.st-livre    {background:rgba(16,185,129,.2);color:#34D399;font-weight:700}
.st-refuse   {background:rgba(239,68,68,.15);color:#FCA5A5}
.st-annule   {background:rgba(100,100,120,.2);color:#9CA3AF}

/* ════════════════════════════════════════════════
   BUTTONS
════════════════════════════════════════════════ */
.btn{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--text);font-family:inherit;transition:all .15s;font-weight:500}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent)}
.btn-success{background:var(--green2);border-color:var(--green);color:#6EE7B7}
.btn-warning{background:var(--amber2);border-color:var(--amber);color:#FCD34D}
.btn-danger {background:var(--red2);border-color:var(--red);color:#FCA5A5}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-block{width:100%;justify-content:center;padding:12px;border-radius:var(--radius)}
.action-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* ════════════════════════════════════════════════
   FORMS
════════════════════════════════════════════════ */
.form-row{margin-bottom:11px}
.form-row label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:10px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);background:var(--bg3);
  color:var(--text);font-family:inherit;font-size:13px;
  transition:border-color .15s;-webkit-appearance:none
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{
  outline:none;border-color:var(--accent)
}
.form-row textarea{resize:none;min-height:70px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ════════════════════════════════════════════════
   CMD CARDS (closeur/livreur)
════════════════════════════════════════════════ */
.cmd-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.cmd-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cmd-id{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.5px}
.cmd-detail{font-size:12px;color:var(--text2);margin-bottom:5px}
.cmd-detail strong{color:var(--text)}
.cmd-tel{font-size:14px;font-weight:700;color:var(--accent);text-decoration:none;display:block;margin:6px 0}
.cod-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.cod-amount{font-size:28px;font-weight:800;color:var(--green)}
.cod-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.motif-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);padding:8px 10px;margin-top:8px;font-size:12px;color:#FCA5A5}
.motif-box strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;opacity:.7}

/* ════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:6px}
.modal p.sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:16px}

/* Motif options */
.motif-opts{display:grid;gap:6px;margin-bottom:10px}
.motif-opt{padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--text);transition:all .15s;text-align:left;width:100%;font-family:inherit}
.motif-opt.sel{border-color:var(--accent);background:rgba(108,99,255,.15);color:#A78BFA}

/* ════════════════════════════════════════════════
   PERF BARS
════════════════════════════════════════════════ */
.bar-bg{background:var(--bg3);border-radius:4px;height:5px;margin-top:4px}
.bar-fill{height:5px;border-radius:4px;transition:width .5s ease}

/* ════════════════════════════════════════════════
   MISC
════════════════════════════════════════════════ */
.loader{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--text2);font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:200;white-space:nowrap;animation:toastIn .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)}
@keyframes toastIn{from{transform:translateX(-50%) translateY(16px);opacity:0}}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.setup-card h3{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.setup-card p{font-size:12px;color:var(--text2);line-height:1.7}
code{background:var(--bg3);padding:2px 7px;border-radius:4px;font-size:11px;font-family:monospace;color:#A78BFA}
.url-display{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:11px;font-family:monospace;color:var(--accent);word-break:break-all;margin:8px 0;cursor:pointer}
@media(min-width:500px){.kpi-grid{grid-template-columns:repeat(4,1fr)}.modal{border-radius:16px;margin-bottom:20px}.modal-bg{align-items:center}}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="logo">CodAfrik</div>
  <div class="sync-badge">
    <div class="sync-dot" id="sdot"></div>
    <span id="slbl">Chargement...</span>
  </div>
</div>

<div class="role-bar" id="role-bar">
  <button class="role-btn r-admin active" onclick="setRole('admin')">👑 Admin</button>
  <button class="role-btn r-closeur" onclick="setRole('closeur')">📞 Closeur</button>
  <button class="role-btn r-livreur" onclick="setRole('livreur')">🚚 Livreur</button>
</div>

<div class="nav" id="nav"></div>
<div class="content" id="content"><div class="loader"><div class="spin"></div>Chargement...</div></div>
<div id="modal-ct"></div>

</div>
<script>
// ════════════════════════════════════════════════
//  CONFIG — MODIFIE SEULEMENT CES VALEURS
// ════════════════════════════════════════════════
const SHEET_ID   = "1-UoulnD4iOFmZ9M_Thbm8qzeDdBGCFRjinbyIY0Syyc";
const SCRIPT_URL = ""; // Colle ton URL Apps Script ici après déploiement

// ════════════════════════════════════════════════
//  ÉTAT GLOBAL
// ════════════════════════════════════════════════
let role = 'admin';
let tab  = 'dashboard';
let orders  = [];
let cfg     = { produits:[], paysUniques:[], villesParPays:{}, livreurs:[], closeurs:[] };
let loading = false;

// Détection rôle via URL
const UP = new URLSearchParams(location.search);
const URL_ROLE = UP.get('role');
const URL_NOM  = UP.get('nom') || '';

// ════════════════════════════════════════════════
//  LECTURE GOOGLE SHEETS (CSV public — sans clé API)
// ════════════════════════════════════════════════
const CSV = name =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;

function parseCSV(txt) {
  const rows = [];
  for (const line of txt.split('\n')) {
    if (!line.trim()) continue;
    const cells = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c==='"') { if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
      else if (c===','&&!inQ) { cells.push(cur.trim()); cur=''; }
      else cur += c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

async function fetchSheet(name) {
  try {
    const r = await fetch(CSV(name));
    if (!r.ok) throw new Error(r.status);
    return parseCSV(await r.text());
  } catch(e) {
    console.error('CSV error:', name, e);
    return [];
  }
}

// Colonnes feuille COMMANDES
const C = {
  ID:0, DATE:1, SHOPIFY:2, CLIENT:3, TEL:4, PAYS:5, VILLE:6,
  PRODUIT:7, QTE:8, PRIX:10, FRAIS:12, CLOSEUR:14, LIVREUR:16,
  STATUT:19, MOTIF:20, SOURCE:23
};

async function loadOrders() {
  const rows = await fetchSheet('COMMANDES');
  return rows.slice(4)
    .filter(r => r[C.CLIENT]?.trim())
    .map(r => ({
      id:      r[C.ID]     ||'',
      date:    r[C.DATE]   ||'',
      shopify: r[C.SHOPIFY]||'',
      client:  r[C.CLIENT] ||'',
      tel:     r[C.TEL]    ||'',
      pays:    r[C.PAYS]   ||'',
      ville:   r[C.VILLE]  ||'',
      produit: r[C.PRODUIT]||'',
      qte:     parseInt(r[C.QTE])||1,
      prix:    parseFloat(String(r[C.PRIX]||'0').replace(',','.'))||0,
      frais:   parseFloat(String(r[C.FRAIS]||'0').replace(',','.'))||0,
      closeur: r[C.CLOSEUR]||'',
      livreur: r[C.LIVREUR]||'',
      statut:  r[C.STATUT] ||'En attente',
      motif:   r[C.MOTIF]  ||'',
      source:  r[C.SOURCE] ||'',
    }));
}

async function loadConfig() {
  const rows = await fetchSheet('CONFIGURATION');
  const produits=[], paysVilles=[], livreurs=[], closeurs=[];
  for (const r of rows) {
    const id = (r[0]||'').trim();
    if (!id) continue;
    if (id.startsWith('PRD') && r[1]) {
      produits.push({
        id, nom:r[1].trim(), categorie:r[2]||'',
        prixAchat:parseFloat(String(r[3]||'0').replace(',','.'))||0,
        prixVente:parseFloat(String(r[4]||'0').replace(',','.'))||0,
      });
    }
    if (id.startsWith('PV') && r[1] && r[2]) {
      const actif = (r[4]||'O').trim();
      if (actif==='O'||actif==='') paysVilles.push({pays:r[1].trim(), ville:r[2].trim()});
    }
    if (id.startsWith('LIV') && r[1]) {
      const actif = (r[7]||'O').trim();
      if (actif==='O'||actif==='') livreurs.push({
        id, nom:(r[1]+' '+(r[2]||'')).trim(),
        tel:r[3]||'', pays:r[4]||'', ville:r[5]||'',
        frais:parseFloat(String(r[6]||'3.5').replace(',','.'))||3.5,
      });
    }
    if (id.startsWith('CLO') && r[1]) {
      const actif = (r[6]||'O').trim();
      if (actif==='O'||actif==='') closeurs.push({
        id, nom:(r[1]+' '+(r[2]||'')).trim(),
        tel:r[3]||'', email:r[4]||'',
        commission:parseFloat(String(r[5]||'3').replace(',','.'))||3,
      });
    }
  }
  const paysUniques = [...new Set(paysVilles.map(p=>p.pays))].filter(Boolean);
  const villesParPays = {};
  paysVilles.forEach(p=>{
    if(!villesParPays[p.pays]) villesParPays[p.pays]=[];
    if(!villesParPays[p.pays].includes(p.ville)) villesParPays[p.pays].push(p.ville);
  });
  return {produits, paysUniques, villesParPays, livreurs, closeurs};
}

// ════════════════════════════════════════════════
//  ÉCRITURE — Apps Script (GET request)
// ════════════════════════════════════════════════
async function callScript(payload) {
  const url = SCRIPT_URL || localStorage.getItem('CA_SCRIPT');
  if (!url) { toast('⚠️ Script URL manquante — va dans Paramètres'); return false; }
  try {
    const u = `${url}?data=${encodeURIComponent(JSON.stringify(payload))}`;
    const r = await fetch(u);
    const t = await r.text();
    let j; try{j=JSON.parse(t)}catch{j={success:true}}
    return j.success !== false;
  } catch(e) { toast('❌ Erreur connexion script'); return false; }
}

// Mise à jour locale immédiate + sync sheet
function localUpdate(id, changes) {
  const o = orders.find(x=>x.id===id);
  if (o) Object.assign(o, changes);
  render();
}

async function updateStatut(id, statut, motif='') {
  localUpdate(id, {statut, motif});
  await callScript({action:'UPDATE_STATUT', cmdId:id, statut, motif});
}
async function assignCloseur(id, nom) {
  localUpdate(id, {closeur:nom, statut:'Assignée closeur'});
  await callScript({action:'ASSIGN_CLOSEUR', cmdId:id, closeurNom:nom});
}
async function assignLivreur(id, nom) {
  localUpdate(id, {livreur:nom, statut:'Assignée livreur'});
  await callScript({action:'ASSIGN_LIVREUR', cmdId:id, livreurNom:nom});
}

// ════════════════════════════════════════════════
//  STATUTS
// ════════════════════════════════════════════════
const STATUTS = {
  'En attente':       'st-attente',
  'Assignée closeur': 'st-acloseur',
  'En appel':         'st-appel',
  'Confirmée':        'st-confirme',
  'Assignée livreur': 'st-alivreur',
  'En livraison':     'st-livraison',
  'Livrée ✓':        'st-livre',
  'Refusée':          'st-refuse',
  'Annulée':          'st-annule',
};
const MOTIFS_ANN = ['Client injoignable (3 tentatives)',"Client a changé d'avis",'Doublon de commande','Mauvais numéro','Prix refusé','Délai trop long','Autre'];
const MOTIFS_REF = ['Client absent','Client nie avoir commandé','Adresse introuvable','Client refuse de payer','Produit endommagé','Mauvais produit livré','Autre'];

function badge(s) {
  const cls = STATUTS[s]||'st-annule';
  return `<span class="st ${cls}">${esc(s)}</span>`;
}
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ════════════════════════════════════════════════
//  TOAST & MODAL
// ════════════════════════════════════════════════
function toast(msg, dur=3000) {
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),dur);
}
function openModal(html) {
  document.getElementById('modal-ct').innerHTML=
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal"><div class="modal-handle"></div>${html}</div>
    </div>`;
}
function closeModal(){document.getElementById('modal-ct').innerHTML='';}

// ════════════════════════════════════════════════
//  NAV & ROLE
// ════════════════════════════════════════════════
const TABS = {
  admin:[
    {id:'dashboard',l:'📊 Dashboard'},
    {id:'commandes',l:'📋 Commandes'},
    {id:'closeurs_p',l:'📞 Closeurs'},
    {id:'livreurs_p',l:'🚚 Livreurs'},
    {id:'motifs',l:'📉 Motifs'},
    {id:'nouveau',l:'➕ Nouveau'},
    {id:'parametres',l:'⚙️ Paramètres'},
  ],
  closeur:[{id:'mes_cmd',l:'📋 Mes commandes'},{id:'histo_clo',l:'🕐 Historique'}],
  livreur:[{id:'mes_liv',l:'🚚 Mes livraisons'},{id:'histo_liv',l:'✓ Historique'}],
};

function setRole(r) {
  role=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.role-btn.r-'+r)?.classList.add('active');
  tab = r==='admin'?'dashboard':r==='closeur'?'mes_cmd':'mes_liv';
  render();
}

function switchTab(t){tab=t;render();}

function renderNav() {
  const pending=orders.filter(o=>o.statut==='En attente').length;
  document.getElementById('nav').innerHTML=TABS[role].map(t=>
    `<button class="nav-btn ${tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.l}${t.id==='commandes'&&pending?`<span class="pill">${pending}</span>`:''}</button>`
  ).join('');
}

// ════════════════════════════════════════════════
//  RENDER ROUTER
// ════════════════════════════════════════════════
function render() {
  renderNav();
  const map={
    dashboard:rDashboard, commandes:rCommandes,
    closeurs_p:rCloseurPerf, livreurs_p:rLivreurPerf,
    motifs:rMotifs, nouveau:rNouveau, parametres:rParams,
    mes_cmd:rCloseurView, histo_clo:rHistoClo,
    mes_liv:rLivreurView, histo_liv:rHistoLiv,
  };
  document.getElementById('content').innerHTML = (map[tab]||rDashboard)();
}

// ════════════════════════════════════════════════
function rCloseurPerf() {
  const noms=[...new Set(orders.map(o=>o.closeur).filter(Boolean))];
  if(!noms.length) return '<div class="empty">Aucune donnée closeur</div>';
  return `<div class="card"><div class="card-head">📞 Performance closeurs</div>
    <div class="tbl-wrap"><table>
      <tr><th>Closeur</th><th>Assignées</th><th>Confirmées</th><th>Annulées</th><th>Taux</th><th>CA</th></tr>
      ${noms.map(cl=>{
        const a=orders.filter(o=>o.closeur===cl).length;
        const c=orders.filter(o=>o.closeur===cl&&['Confirmée','Assignée livreur','En livraison','Livrée ✓'].includes(o.statut)).length;
        const ann=orders.filter(o=>o.closeur===cl&&o.statut==='Annulée').length;
        const ca=orders.filter(o=>o.closeur===cl&&o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte,0);
        const t=a>0?Math.round(c/a*100):0;
        const col=t>=75?'var(--green)':t>=50?'var(--amber)':'var(--red)';
        return `<tr><td><strong>${esc(cl)}</strong></td><td>${a}</td><td>${c}</td><td>${ann}</td>
          <td style="color:${col};font-weight:700">${t}%
            <div class="bar-bg"><div class="bar-fill" style="width:${t}%;background:${col}"></div></div>
          </td><td><strong>$${ca.toFixed(0)}</strong></td></tr>`;
      }).join('')}
    </table></div></div>`;
}

// ════════════════════════════════════════════════
//  MOTIFS
// ════════════════════════════════════════════════
function rMotifs() {
  function chart(list, color) {
    if(!list.length) return '<div class="empty">Aucun motif</div>';
    const counts={};
    list.forEach(o=>{if(o.motif)counts[o.motif]=(counts[o.motif]||0)+1;});
    const max=Math.max(...Object.values(counts));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([m,n])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span>${esc(m)}</span><strong>${n}</strong>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(n/max*100)}%;background:${color}"></div></div>
      </div>`).join('');
  }
  return `
  <div class="card"><div class="card-head">✕ Refus <span class="badge" style="background:rgba(239,68,68,.2);color:#FCA5A5">${orders.filter(o=>o.statut==='Refusée').length}</span></div>
    <div class="card-body">${chart(orders.filter(o=>o.statut==='Refusée'),'var(--red)')}</div></div>
  <div class="card"><div class="card-head">✕ Annulations <span class="badge" style="background:rgba(100,100,120,.2);color:#9CA3AF">${orders.filter(o=>o.statut==='Annulée').length}</span></div>
    <div class="card-body">${chart(orders.filter(o=>o.statut==='Annulée'),'var(--text2)')}</div></div>
  <div class="card"><div class="card-head">📋 Détail</div>
    <div class="tbl-wrap"><table>
      <tr><th>ID</th><th>Client</th><th>Closeur</th><th>Livreur</th><th>Statut</th><th>Motif</th></tr>
      ${orders.filter(o=>o.motif).map(o=>`<tr>
        <td style="font-size:10px;color:var(--text2)">${esc(o.id)}</td>
        <td>${esc(o.client)}</td><td style="font-size:11px">${esc(o.closeur)||'—'}</td>
        <td style="font-size:11px">${esc(o.livreur)||'—'}</td>
        <td>${badge(o.statut)}</td>
        <td style="font-size:12px;color:#FCA5A5">${esc(o.motif)}</td>
      </tr>`).join('')||'<tr><td colspan="6"><div class="empty">Aucun motif</div></td></tr>'}
    </table></div></div>`;
}

function majVilles() {
  const pays = document.getElementById('n_pays')?.value;
  const sel  = document.getElementById('n_ville');
  if (!sel||!pays) return;
  const vs = cfg.villesParPays[pays]||[];
  sel.innerHTML = vs.length ? vs.map(v=>`<option>${v}</option>`).join('') : `<option>${pays}</option>`;
}

async function creerCommande() {
  const client = document.getElementById('n_client')?.value.trim();
  if (!client) { toast('⚠️ Nom client requis'); return; }
  const prodRaw = (document.getElementById('n_produit')?.value||'').split('|');
  const prodId  = prodRaw[0]||'PRD001';
  const prix    = parseFloat(prodRaw[1])||20;
  const closeur = document.getElementById('n_closeur')?.value||'';
  const pays    = document.getElementById('n_pays')?.value||'';
  const ville   = document.getElementById('n_ville')?.value||'';
  const qte     = parseInt(document.getElementById('n_qte')?.value)||1;
  const source  = document.getElementById('n_source')?.value||'';
  const now     = new Date().toISOString().split('T')[0];
  const newId   = 'CMD-'+String(orders.length+1).padStart(4,'0');

  // Ajout local immédiat
  const newOrder = {
    id:newId, date:now, shopify:'', client, tel:document.getElementById('n_tel')?.value||'',
    pays, ville, produit:prodId, qte, prix, frais:3.5,
    closeur, livreur:'', statut:closeur?'Assignée closeur':'En attente',
    motif:'', source,
  };
  orders.unshift(newOrder);

  // Envoi vers Sheet
  const row = [newId,now,'',client,document.getElementById('n_tel')?.value||'',pays,ville,prodId,qte,'',prix,'',3.5,'',closeur,'','','','',closeur?'Assignée closeur':'En attente','','','',source];
  const ok = await callScript({action:'ADD_COMMANDE', data:row});

  const msg = document.getElementById('n_msg');
  if(msg) msg.textContent = ok ? `✓ ${newId} créée et enregistrée dans Google Sheets !` : `✓ ${newId} créée localement (sync Sheet en attente)`;
  setTimeout(()=>switchTab('commandes'),1500);
}

function copyText(el) {
  navigator.clipboard.writeText(el.textContent).then(()=>toast('✓ Lien copié !'));

    <div style="font-size:11px;color:var(--text2)">${actifs.length} livraison(s) à effectuer</div></div>
  </div>
  ${actifs.length===0?'<div class="empty">✓ Aucune livraison en attente</div>':''}
  ${actifs.map(o=>`
  <div class="cmd-card">
    <div class="cmd-top"><strong>${esc(o.id)}</strong>${badge(o.statut)}</div>
    <div class="cmd-detail">👤 <strong>${esc(o.client)}</strong></div>
    <a href="tel:${esc(o.tel)}" class="cmd-tel">📞 ${esc(o.tel)}</a>
    <div class="cmd-detail">📦 ${esc(o.produit)} ×${o.qte}</div>
    <div class="cod-box">
      <div><div class="cod-label">Montant COD à collecter</div><div class="cod-amount">$${(o.prix*o.qte).toFixed(0)}</div></div>
      <div style="text-align:right"><div class="cod-label">Ta commission</div><div style="font-size:18px;font-weight:700;color:var(--accent)">$${o.frais.toFixed(1)}</div></div>
    </div>
    <div class="action-row">
      ${o.statut!=='En livraison'?`<button class="btn btn-warning" onclick="livRoute('${esc(o.id)}')">🚗 En route</button>`:''}
      <button class="btn btn-success" style="flex:1" onclick="livLivrer('${esc(o.id)}')">✓ Livrée & COD collecté</button>
      <button class="btn btn-danger" onclick="openMotif('ref','${esc(o.id)}')">✕ Refusée</button>
    </div>
  </div>`).join('')}`;
}

async function livRoute(id)  { await updateStatut(id,'En livraison'); toast('🚗 En route'); }
async function livLivrer(id) { await updateStatut(id,'Livrée ✓'); toast('✅ Livraison confirmée !'); }

// ════════════════════════════════════════════════
//  HISTORIQUES
// ════════════════════════════════════════════════
function rHistoClo() {
  const moi=URL_NOM||cfg.closeurs[0]?.nom||'';
  const hist=orders.filter(o=>o.closeur===moi&&['Livrée ✓','Annulée','Refusée'].includes(o.statut));
  const l=hist.filter(o=>o.statut==='Livrée ✓').length;
  return `
  <div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="kpi" style="border-top-color:var(--green)"><div class="kpi-label">Livrées</div><div class="kpi-val">${l}</div></div>
    <div class="kpi" style="border-top-color:var(--text2)"><div class="kpi-label">Annulées</div><div class="kpi-val">${hist.filter(o=>o.statut==='Annulée').length}</div></div>
    <div class="kpi" style="border-top-color:var(--accent)"><div class="kpi-label">Taux confirm.</div><div class="kpi-val">${hist.length>0?Math.round(l/hist.length*100):0}%</div></div>
  </div>
  <div class="card"><div class="card-head">🕐 Historique</div>
  <div class="tbl-wrap"><table>
    <tr><th>ID</th><th>Client</th><th>Statut</th><th>Motif</th></tr>
    ${hist.map(o=>`<tr><td style="font-size:10px;color:var(--text2)">${esc(o.id)}</td>
      <td>${esc(o.client)}</td><td>${badge(o.statut)}</td>
      <td style="font-size:11px;color:#FCA5A5">${esc(o.motif)||'—'}</td></tr>`).join('')
    ||'<tr><td colspan="4"><div class="empty">Aucun historique</div></td></tr>'}
  </table></div></div>`;
}

function rHistoLiv() {
  const moi=URL_NOM||cfg.livreurs[0]?.nom||'';
  const hist=orders.filter(o=>o.livreur===moi&&['Livrée ✓','Refusée'].includes(o.statut));
  const l=hist.filter(o=>o.statut==='Livrée ✓').length;
  const ca=hist.filter(o=>o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte,0);
  return `
  <div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="kpi" style="border-top-color:var(--green)"><div class="kpi-label">Livrées</div><div class="kpi-val">${l}</div></div>
    <div class="kpi" style="border-top-color:var(--red)"><div class="kpi-label">Refusées</div><div class="kpi-val">${hist.length-l}</div></div>
    <div class="kpi" style="border-top-color:var(--accent)"><div class="kpi-label">CA collecté</div><div class="kpi-val">$${ca.toFixed(0)}</div></div>
  </div>
  <div class="card"><div class="card-head">✓ Historique livraisons</div>
  <div class="tbl-wrap"><table>
    <tr><th>ID</th><th>Client</th><th>Montant</th><th>Résultat</th><th>Motif</th></tr>
    ${hist.map(o=>`<tr><td style="font-size:10px;color:var(--text2)">${esc(o.id)}</td>
      <td>${esc(o.client)}</td><td><strong>$${(o.prix*o.qte).toFixed(0)}</strong></td>
      <td>${badge(o.statut)}</td><td style="font-size:11px;color:#FCA5A5">${esc(o.motif)||'—'}</td></tr>`).join('')
    ||'<tr><td colspan="5"><div class="empty">Aucun historique</div></td></tr>'}
  </table></div></div>`;
}

// ════════════════════════════════════════════════
//  MODALS ADMIN
// ════════════════════════════════════════════════
function openAssign(id) {
  const o=orders.find(x=>x.id===id);
  const livsVille=cfg.livreurs.filter(l=>!o.ville||l.ville===o.ville);
  openModal(`
    <h3>✏️ Modifier — ${esc(id)}</h3>
    <p class="sub">${esc(o.client)} · ${esc(o.ville)} · ${badge(o.statut)}</p>
    <div class="form-row"><label>Closeur</label>
      <select id="m_clo"><option value="">— Non assigné —</option>
        ${cfg.closeurs.map(c=>`<option ${o.closeur===c.nom?'selected':''}>${c.nom}</option>`).join('')}
      </select></div>
    <div class="form-row"><label>Livreur</label>
      <select id="m_liv"><option value="">— Non assigné —</option>
        ${livsVille.map(l=>`<option ${o.livreur===l.nom?'selected':''}>${l.nom}</option>`).join('')}
        ${!livsVille.length?cfg.livreurs.map(l=>`<option ${o.livreur===l.nom?'selected':''}>${l.nom}</option>`).join(''):''}
      </select></div>
    <div class="form-row"><label>Statut</label>
      <select id="m_stat">${Object.keys(STATUTS).map(s=>`<option ${o.statut===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="modal-btns">
      <button class="btn" style="flex:1" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveAssign('${esc(id)}')">Enregistrer</button>
    </div>`);
}

async function saveAssign(id) {
  const clo=document.getElementById('m_clo')?.value;
  const liv=document.getElementById('m_liv')?.value;
  const sta=document.getElementById('m_stat')?.value;
  const o=orders.find(x=>x.id===id);
  if(clo&&clo!==o.closeur) await assignCloseur(id,clo);
  if(liv&&liv!==o.livreur) await assignLivreur(id,liv);
  if(sta&&sta!==o.statut)  await updateStatut(id,sta,'');
  closeModal(); toast('✓ Mis à jour');
}

function openAssignLiv(id) {
  const o=orders.find(x=>x.id===id);
  const livs=cfg.livreurs.filter(l=>!o.ville||l.ville===o.ville);
  openModal(`
    <h3>🚚 Assigner livreur</h3>
    <p class="sub">${esc(o.client)} · ${esc(o.ville)}</p>
    <div class="form-row"><label>Livreur</label>
      <select id="m_liv2">
        ${livs.map(l=>`<option>${l.nom}</option>`).join('')}
        ${!livs.length?cfg.livreurs.map(l=>`<option>${l.nom}</option>`).join(''):''}
      </select></div>
    <div class="modal-btns">
      <button class="btn" style="flex:1" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" style="flex:1" onclick="doAssignLiv('${esc(id)}')">Assigner</button>
    </div>`);
}

async function doAssignLiv(id) {
  const lv=document.getElementById('m_liv2')?.value;
  await assignLivreur(id,lv);
  closeModal(); toast(`🚚 Assigné à ${lv}`);
}

function openTL(id) {
  const o=orders.find(x=>x.id===id);
  const steps=[
    {c:'#6C63FF',t:'Commande créée',d:o.date},
    o.closeur&&{c:'#F59E0B',t:'Closeur assigné',d:o.closeur},
    ['Confirmée','Assignée livreur','En livraison','Livrée ✓'].includes(o.statut)&&{c:'#10B981',t:'Confirmée'},
    o.livreur&&{c:'#F97316',t:'Livreur assigné',d:o.livreur},
    ['En livraison','Livrée ✓'].includes(o.statut)&&{c:'#F59E0B',t:'En cours de livraison'},
    o.statut==='Livrée ✓'&&{c:'#10B981',t:'Livrée ✓ — COD collecté'},
    o.motif&&{c:'#EF4444',t:o.statut,d:o.motif},
  ].filter(Boolean);
  openModal(`
    <h3>🕐 Suivi — ${esc(id)}</h3>
    <p class="sub">${esc(o.client)} · ${esc(o.produit)} ×${o.qte}</p>
    <div style="padding:4px 0">
      ${steps.map(s=>`<div style="display:flex;gap:10px;margin-bottom:12px;align-items:flex-start">
        <div style="width:10px;height:10px;border-radius:50%;background:${s.c};flex-shrink:0;margin-top:3px"></div>
        <div style="font-size:12px;color:var(--text2)"><strong style="color:var(--text)">${esc(s.t)}</strong>${s.d?`<br>${esc(s.d)}`:''}</div>
      </div>`).join('')}
    </div>
    <div style="text-align:center;margin:8px 0">${badge(o.statut)}</div>
    ${o.motif?`<div class="motif-box"><strong>Motif</strong>${esc(o.motif)}</div>`:''}
    <div class="modal-btns"><button class="btn" style="flex:1" onclick="closeModal()">Fermer</button></div>`);
}

// ════════════════════════════════════════════════
//  MODAL MOTIF
// ════════════════════════════════════════════════
function openMotif(type, id) {
  const o=orders.find(x=>x.id===id);
  const motifs=type==='ann'?MOTIFS_ANN:MOTIFS_REF;
  openModal(`
    <h3>${type==='ann'?'✕ Annuler':'✕ Marquer refusée'}</h3>
    <p class="sub">${esc(o.id)} — ${esc(o.client)}</p>
    <div class="motif-opts">
      ${motifs.map(m=>`<button class="motif-opt" onclick="selMotif(this,'${esc(m)}')">${esc(m)}</button>`).join('')}
    </div>
    <div class="form-row" id="autre-row" style="display:none">
      <label>Préciser</label>
      <textarea id="motif-autre" placeholder="Décrivez..."></textarea>
    </div>
    <div class="form-row">
      <label>Commentaire (optionnel)</label>
      <textarea id="motif-comment" placeholder="Infos supplémentaires..." style="min-height:56px"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn" style="flex:1" onclick="closeModal()">Retour</button>
      <button class="btn btn-danger" style="flex:1" onclick="submitMotif('${type}','${esc(id)}')">Enregistrer</button>
    </div>`);
}

function selMotif(btn, val) {
  document.querySelectorAll('.motif-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); btn.dataset.val=val;
  const ar=document.getElementById('autre-row');
  if(ar) ar.style.display=val==='Autre'?'block':'none';
}

async function submitMotif(type, id) {
  const sel=document.querySelector('.motif-opt.sel');
  if(!sel){toast('⚠️ Choisis un motif');return;}
  const base=sel.dataset.val;
  const autre=document.getElementById('motif-autre')?.value||'';
  const comment=document.getElementById('motif-comment')?.value||'';
  const motif=(base==='Autre'?autre||'Autre':base)+(comment?` — ${comment}`:'');
  const statut=type==='ann'?'Annulée':'Refusée';
  await updateStatut(id,statut,motif);
  closeModal(); toast(`${statut} — motif enregistré`);
}

// ════════════════════════════════════════════════
//  SYNC STATUS
// ════════════════════════════════════════════════
function setSyncStatus(state) {
  const dot=document.getElementById('sdot');
  const lbl=document.getElementById('slbl');
  if(!dot||!lbl) return;
  dot.className='sync-dot'+(state==='loading'?' loading':state==='error'?' off':'');
  lbl.textContent=state==='loading'?'Chargement...':state==='error'?'Hors ligne':'Connecté';
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
async function init() {
  // Rôle via URL
  if (URL_ROLE&&['closeur','livreur'].includes(URL_ROLE)) {
    role=URL_ROLE;
    tab=role==='closeur'?'mes_cmd':'mes_liv';
    document.getElementById('role-bar').style.display='none';
  }

  setSyncStatus('loading');
  try {
    const [o, c] = await Promise.all([loadOrders(), loadConfig()]);
    orders = o;
    cfg    = c;
    setSyncStatus('ok');
    console.log(`✅ ${orders.length} commandes | ${cfg.produits.length} produits | ${cfg.closeurs.length} closeurs | ${cfg.livreurs.length} livreurs`);
  } catch(e) {
    setSyncStatus('error');
    console.error('Erreur chargement:', e);
  }

  render();

  // Rafraîchissement auto toutes les 30s (seulement si pas closeur/livreur en train d'agir)
  setInterval(async()=>{
    try {
      const [o,c]=await Promise.all([loadOrders(),loadConfig()]);
      orders=o; cfg=c; setSyncStatus('ok');
      render();
    } catch(e){ setSyncStatus('error'); }
  }, 30000);
}

init();
</script>
</body>
</html>
