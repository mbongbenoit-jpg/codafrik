<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0D18">
<title>CodAfrik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D0D18;--bg2:#141420;--bg3:#1E1E2E;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);
  --t:#EEEEF8;--t2:#666688;
  --ac:#7C6FFF;--ac2:#5A4FE0;
  --gr:#00C896;--gr2:rgba(0,200,150,.12);
  --am:#FFB547;--am2:rgba(255,181,71,.12);
  --re:#FF5C7A;--re2:rgba(255,92,122,.12);
  --r:14px;--rs:9px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);font-size:14px}
.app{display:flex;flex-direction:column;min-height:100vh}
.top{background:var(--bg2);border-bottom:1px solid var(--b);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:800;background:linear-gradient(120deg,#7C6FFF,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cbtn{background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;color:#888;cursor:pointer;font-family:inherit}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--gr);margin-left:auto;flex-shrink:0}
.sdot.e{background:var(--re)}.sdot.l{background:var(--am);animation:bl .8s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.rbar{background:var(--bg);border-bottom:1px solid var(--b);display:flex;padding:6px;gap:5px}
.rb{flex:1;padding:8px 6px;border-radius:var(--rs);border:none;background:transparent;color:#555;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:.2s}
.rb.on{color:#fff}
.rb.ra.on{background:var(--ac2)}.rb.rc.on{background:#B45309}.rb.rl.on{background:#065F46}
.nav{background:var(--bg2);border-bottom:1px solid var(--b);display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{padding:11px 14px;border:none;background:transparent;color:#555;cursor:pointer;font-size:12px;font-weight:600;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:.15s}
.nb.on{color:var(--ac);border-bottom-color:var(--ac)}
.pill{background:var(--re);color:#fff;border-radius:20px;font-size:9px;padding:1px 5px;margin-left:2px;font-weight:700}
.ct{padding:14px;flex:1;max-width:760px;margin:0 auto;width:100%}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:14px;border-top:3px solid}
.kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#555;margin-bottom:4px}
.kv{font-size:24px;font-weight:800;letter-spacing:-.5px}
.ks{font-size:11px;color:#555;margin-top:2px}
.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.ch{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;flex-wrap:wrap}
.cb{padding:16px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#555;background:var(--bg3);border-bottom:1px solid var(--b)}
td{padding:9px 12px;border-bottom:1px solid var(--b);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.st{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.s0{background:rgba(59,130,246,.15);color:#7EB8FF}.s1{background:rgba(124,111,255,.15);color:#B3A8FF}
.s2{background:var(--am2);color:#FFD080}.s3{background:var(--gr2);color:#60EEC0}
.s4{background:rgba(249,115,22,.15);color:#FFB07A}.s5{background:var(--am2);color:#FFD080}
.s6{background:rgba(0,200,150,.2);color:#00E8A8;font-weight:800}.s7{background:var(--re2);color:#FF8FAA}
.s8{background:rgba(100,100,130,.15);color:#888}.s9{background:rgba(255,50,50,.2);color:#FF3333;font-weight:800;animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.btn{padding:8px 14px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--t);font-family:inherit;font-weight:600;transition:.15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--ac2);border-color:var(--ac);color:#fff}
.bs{background:var(--gr2);border-color:rgba(0,200,150,.3);color:#60EEC0}
.bw{background:var(--am2);border-color:rgba(255,181,71,.3);color:#FFD080}
.bd{background:var(--re2);border-color:rgba(255,92,122,.3);color:#FF8FAA}
.bsm{padding:4px 9px;font-size:11px}
.bbl{width:100%;justify-content:center;padding:13px;border-radius:var(--r);font-size:13px;display:block;text-align:center}
.arow{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.fr{margin-bottom:11px}
.fr label{font-size:10px;color:#555;display:block;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fr input,.fr select,.fr textarea{width:100%;padding:10px 12px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--bg3);color:var(--t);font-family:inherit;font-size:13px;-webkit-appearance:none;outline:none;transition:.15s}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--ac)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cc{background:var(--bg3);border:1px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:10px}
.ct2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ci{font-size:10px;color:#555;font-weight:700;letter-spacing:.6px}
.ctel{font-size:16px;font-weight:800;color:var(--ac);text-decoration:none;display:block;margin:8px 0}
.cod{background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);padding:14px;margin:12px 0;display:flex;justify-content:space-between;align-items:center}
.codamt{font-size:30px;font-weight:900;color:var(--gr);letter-spacing:-1px}
.codlbl{font-size:10px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:20px 20px 0 0;padding:20px 18px 38px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mh{width:40px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 18px}
.modal h3{font-size:15px;font-weight:800;margin-bottom:5px}
.msub{font-size:12px;color:#555;margin-bottom:16px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mopts{display:grid;gap:6px;margin-bottom:10px}
.mopt{padding:10px 13px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--t);text-align:left;width:100%;font-family:inherit;font-weight:500;transition:.15s}
.mopt.sel{border-color:var(--ac);background:rgba(124,111,255,.15);color:#B3A8FF;font-weight:700}
.empty{text-align:center;padding:32px;color:#444;font-size:13px}
.loader{text-align:center;padding:40px;color:#444}
.spin{width:28px;height:28px;border:3px solid var(--b);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--b2);color:var(--t);padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:200;white-space:nowrap;animation:ti .25s ease;box-shadow:0 12px 40px rgba(0,0,0,.6);font-weight:600}
@keyframes ti{from{transform:translateX(-50%) translateY(16px);opacity:0}}
.bar-bg{background:var(--bg3);border-radius:3px;height:5px;margin-top:4px}
.bar{height:5px;border-radius:3px;transition:width .6s}
.ubox{background:var(--bg3);border:1px solid var(--b);border-radius:var(--rs);padding:10px 12px;font-size:11px;font-family:monospace;color:var(--ac);word-break:break-all;margin:5px 0;cursor:pointer}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#555;margin:14px 0 6px}
.aok{background:var(--gr2);color:#60EEC0;border:1px solid rgba(0,200,150,.2);border-radius:var(--rs);padding:10px 13px;font-size:12px;margin-bottom:8px;font-weight:600}
@media(min-width:500px){.kg{grid-template-columns:repeat(4,1fr)}.modal{border-radius:16px;margin-bottom:24px}.mbg{align-items:center}}
</style>
</head>
<body>
<div class="app">
<div class="top">
  <div class="logo">CodAfrik</div>
  <button class="cbtn" onclick="openCurModal()">💱 <span id="clbl">USD</span></button>
  <div class="sdot l" id="sdot"></div>
</div>
<div class="rbar" id="rbar">
  <button class="rb ra on" onclick="setRole('admin')">👑 Admin</button>
  <button class="rb rc" onclick="setRole('closeur')">📞 Closeur</button>
  <button class="rb rl" onclick="setRole('livreur')">🚚 Livreur</button>
</div>
<div class="nav" id="nav"></div>
<div class="ct" id="main"><div class="loader"><div class="spin"></div>Chargement...</div></div>
<div id="mct"></div>
</div>
<script>
const SHEET_ID="1-UoulnD4iOFmZ9M_Thbm8qzeDdBGCFRjinbyIY0Syyc";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzP-qpSBlL92rItds-lr3mQA_fPkUO3YI3xX9UpOvsoF6E2dIXdFYXK5Nv_ZLFaHGsH/exec";
const CSV=n=>`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`;
const DEV={USD:{s:'$',n:'Dollar US',r:1},EUR:{s:'€',n:'Euro',r:0.92},XOF:{s:'F',n:'Franc CFA (UEMOA)',r:1},XAF:{s:'F',n:'Franc CFA (CEMAC)',r:1},MAD:{s:'DH',n:'Dirham marocain',r:9.9},GHS:{s:'₵',n:'Cedi ghanéen',r:15.5},NGN:{s:'₦',n:'Naira nigérian',r:1600},GNF:{s:'FG',n:'Franc guinéen',r:8600}};
let CC=localStorage.getItem('CA_CUR')||'USD';
const cur=()=>DEV[CC]||DEV.USD;
function fmt(v){const c=cur(),x=v*c.r;return c.s+(x>=1000?Math.round(x).toLocaleString('fr-FR'):(x<10?x.toFixed(2):Math.round(x)));}
function openCurModal(){openModal(`<h3>💱 Devise</h3><div class="mopts">${Object.entries(DEV).map(([k,c])=>`<button class="mopt ${CC===k?'sel':''}" onclick="setCur('${k}')"><strong>${c.s} ${k}</strong> — ${c.n}${k!=='USD'?`<span style="float:right;font-size:10px;opacity:.5">1$=${c.r}</span>`:''}</button>`).join('')}</div><div class="mbtns"><button class="btn" style="flex:1" onclick="closeModal()">Fermer</button></div>`);}
function setCur(k){CC=k;localStorage.setItem('CA_CUR',k);document.getElementById('clbl').textContent=k;closeModal();render();toast(`Devise : ${cur().s}${k}`);}
let role='admin',tab='dashboard',orders=[],cfg={produits:[],paysUniques:[],villesParPays:{},livreurs:[],closeurs:[]},fFrom='',fTo='';
const UP=new URLSearchParams(location.search),UROLE=UP.get('role')||'',UNOM=UP.get('nom')||'';
function parseCSV(txt){const rows=[];for(const line of txt.split('\n')){if(!line.trim())continue;const cells=[];let c='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){c+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){cells.push(c.trim());c='';}else c+=ch;}cells.push(c.trim());rows.push(cells);}return rows;}
async function fetchCSV(name){const r=await fetch(CSV(name));if(!r.ok)throw new Error(`HTTP ${r.status}`);return parseCSV(await r.text());}
const C={ID:0,DATE:1,QUARTIER:2,CLIENT:3,TEL:4,PAYS:5,VILLE:6,PRODUIT:7,QTE:8,PRIX:10,FRAIS:12,CLOSEUR:14,LIVREUR:16,DATELIV:18,STATUT:19,MOTIF:20,SOURCE:23};
async function loadOrders(){const rows=await fetchCSV('COMMANDES');return rows.slice(4).filter(r=>r[C.CLIENT]?.trim()).map(r=>({id:r[C.ID]||'',date:r[C.DATE]||'',shopify:r[C.SHOPIFY]||'',client:r[C.CLIENT]||'',tel:r[C.TEL]||'',pays:r[C.PAYS]||'',ville:r[C.VILLE]||'',produit:r[C.PRODUIT]||'',qte:parseInt(r[C.QTE])||1,prix:parseFloat(String(r[C.PRIX]||'0').replace(/[^0-9,.]/g,'').replace(',','.'))||0,frais:parseFloat(String(r[C.FRAIS]||'0').replace(/[^0-9,.]/g,'').replace(',','.'))||0,closeur:r[C.CLOSEUR]||'',livreur:r[C.LIVREUR]||'',statut:r[C.STATUT]||'En attente',motif:r[C.MOTIF]||'',quartier:r[C.QUARTIER]||'',dateLiv:(()=>{const d=(r[C.DATELIV]||'').split('|');return d[0]||'';})(),heureLiv:(()=>{const d=(r[C.DATELIV]||'').split('|');return d[1]||'';})(),noteLiv:(()=>{const d=(r[C.DATELIV]||'').split('|');return d.slice(2).join('|')||'';})(),source:r[C.SOURCE]||''}));}
async function loadConfig(){const rows=await fetchCSV('CONFIGURATION');const P=[],PV=[],LV=[],CL=[];for(const r of rows){const id=(r[0]||'').trim();if(!id)continue;if(id.startsWith('PRD')&&r[1])P.push({id,nom:r[1].trim(),prixVente:parseFloat(String(r[4]||'0').replace(',','.'))||0});if(id.startsWith('PV')&&r[1]&&r[2]){const a=(r[4]||'O').trim();if(a==='O'||a==='')PV.push({pays:r[1].trim(),ville:r[2].trim()});}if(id.startsWith('LIV')&&r[1]){const a=(r[7]||'O').trim();if(a==='O'||a==='')LV.push({id,nom:(r[1]+' '+(r[2]||'')).trim(),tel:r[3]||'',pays:r[4]||'',ville:r[5]||'',frais:parseFloat(String(r[6]||'3.5').replace(',','.'))||3.5});}if(id.startsWith('CLO')&&r[1]){const a=(r[6]||'O').trim();if(a==='O'||a==='')CL.push({id,nom:(r[1]+' '+(r[2]||'')).trim(),tel:r[3]||'',commission:parseFloat(String(r[5]||'3').replace(',','.'))||3});}}const paysUniques=[...new Set(PV.map(p=>p.pays))].filter(Boolean);const villesParPays={};PV.forEach(p=>{if(!villesParPays[p.pays])villesParPays[p.pays]=[];if(!villesParPays[p.pays].includes(p.ville))villesParPays[p.pays].push(p.ville);});return{produits:P,paysUniques,villesParPays,livreurs:LV,closeurs:CL};}
async function post(payload){
  try {
    // Convertit le payload en paramètres URL pour Apps Script
    const params = new URLSearchParams();
    if(payload.action==='ADD_COMMANDE') {
      const d=payload.data||[];
      params.append('action','ADD');
      params.append('id',payload.cmdId||d[0]||'');
      params.append('date',d[1]||'');
      params.append('shopify',d[2]||'');
      params.append('client',d[3]||'');
      params.append('tel',d[4]||'');
      params.append('pays',d[5]||'');
      params.append('ville',d[6]||'');
      params.append('produit',d[7]||'');
      params.append('qte',d[8]||'1');
      params.append('prix',d[10]||'0');
      params.append('frais',d[12]||'3.5');
      params.append('closeur',payload.closeurNom||d[14]||'');
      params.append('statut',payload.statut||d[19]||'En attente');
      params.append('source',d[23]||'');
    } else if(payload.action==='UPDATE_STATUT') {
      params.append('action','UPDATE');
      params.append('id',payload.cmdId||'');
      params.append('statut',payload.statut||'');
      params.append('motif',payload.motif||'');
      if(payload.frais) params.append('frais',payload.frais);
    } else if(payload.action==='ASSIGN_CLOSEUR') {
      params.append('action','UPDATE');
      params.append('id',payload.cmdId||'');
      params.append('closeur',payload.closeurNom||'');
      params.append('statut','Assignée closeur');
    } else if(payload.action==='ASSIGN_LIVREUR') {
      params.append('action','UPDATE');
      params.append('id',payload.cmdId||'');
      params.append('livreur',payload.livreurNom||'');
      params.append('statut','Assignée livreur');
      if(payload.dateLiv)  params.append('dateLiv',payload.dateLiv);
      if(payload.heureLiv) params.append('heureLiv',payload.heureLiv);
      if(payload.noteLiv)  params.append('noteLiv',payload.noteLiv);
      if(payload.quartier) params.append('quartier',payload.quartier);
      if(payload.quartier) params.append('quartierCol',payload.quartier);
    } else if(payload.action==='CONFIRM_LIVRAISON') {
      params.append('action','UPDATE');
      params.append('id',payload.cmdId||'');
      params.append('statut','Livrée ✓');
      params.append('frais',payload.frais||'0');
      params.append('motif',payload.motif||'');
    } else if(payload.action==='DELETE_COMMANDE') {
      params.append('action','DELETE');
      params.append('id',payload.cmdId||'');
    }
    const url = SCRIPT_URL+'?'+params.toString();
    const r = await fetch(url);
    const j = await r.json();
    return j.ok===true;
  } catch(e) { console.error('Script error:',e); return false; }
}
const STM={'En attente':'s0','Assignée closeur':'s1','En appel':'s2','Confirmée':'s3','Assignée livreur':'s4','En livraison':'s5','Livrée ✓':'s6','Refusée':'s7','Annulée':'s8','À rappeler':'s9'};
const MA=['Client injoignable (3 tentatives)',"Client a changé d'avis",'Doublon','Mauvais numéro','Prix refusé','Délai trop long','Autre'];
const MR=['Client absent','Client nie avoir commandé','Adresse introuvable','Client refuse de payer','Produit endommagé','Mauvais produit livré','Autre'];
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function badge(s){return `<span class="st ${STM[s]||'s8'}">${esc(s)}</span>`;}
function toast(msg,d=3200){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),d);}
function openModal(h){document.getElementById('mct').innerHTML=`<div class="mbg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="mh"></div>${h}</div></div>`;}
function closeModal(){document.getElementById('mct').innerHTML='';}
function ss(s){const d=document.getElementById('sdot');if(d)d.className='sdot'+(s==='l'?' l':s==='e'?' e':'');}
function fd(list){if(!fFrom&&!fTo)return list;return list.filter(o=>{if(!o.date)return true;if(fFrom&&o.date<fFrom)return false;if(fTo&&o.date>fTo)return false;return true;});}
function applyF(){fFrom=document.getElementById('ff')?.value||'';fTo=document.getElementById('ft')?.value||'';render();toast('Filtre appliqué');}
function resetF(){fFrom='';fTo='';render();toast('Filtre effacé');}
function localUp(id,ch){const o=orders.find(x=>x.id===id);if(o)Object.assign(o,ch);render();}
async function updSt(id,st,mo=''){
  localUp(id,{statut:st,motif:mo});
  await post({action:'UPDATE_STATUT',cmdId:id,statut:st,motif:mo});
  if(role==='closeur') swTab('mes_cmd');
  else if(role==='livreur') swTab('mes_liv');
}
async function asgClo(id,nom){localUp(id,{closeur:nom,statut:'Assignée closeur'});await post({action:'ASSIGN_CLOSEUR',cmdId:id,closeurNom:nom});}
async function asgLiv(id,nom){localUp(id,{livreur:nom,statut:'Assignée livreur'});await post({action:'ASSIGN_LIVREUR',cmdId:id,livreurNom:nom});}
const TABS={admin:[{id:'dashboard',l:'📊 Dashboard'},{id:'commandes',l:'📋 Commandes'},{id:'bilan',l:'📅 Bilan'},{id:'closeurs_p',l:'📞 Closeurs'},{id:'livreurs_p',l:'🚚 Livreurs'},{id:'motifs',l:'📉 Motifs'},{id:'params',l:'⚙️ Paramètres'}],closeur:[{id:'mes_cmd',l:'📋 Mes commandes'},{id:'bilan_clo',l:'📅 Mon bilan'},{id:'histo_clo',l:'🕐 Historique'}],livreur:[{id:'mes_liv',l:'🚚 Mes livraisons'},{id:'bilan_liv',l:'📅 Mon bilan'},{id:'histo_liv',l:'✓ Historique'}]};
function setRole(r){role=r;document.querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));document.querySelector('.rb.r'+r[0])?.classList.add('on');tab=r==='admin'?'dashboard':r==='closeur'?'mes_cmd':'mes_liv';render();}
function swTab(t){tab=t;render();}
function renderNav(){const p=orders.filter(o=>o.statut==='En attente').length;document.getElementById('nav').innerHTML=TABS[role].map(t=>`<button class="nb ${tab===t.id?'on':''}" onclick="swTab('${t.id}')">${t.l}${t.id==='commandes'&&p?`<span class="pill">${p}</span>`:''}</button>`).join('');}
function render(){renderNav();const M={dashboard:rDB,commandes:rCmd,bilan:rBilanA,closeurs_p:rClP,livreurs_p:rLvP,motifs:rMot,params:rPar,mes_cmd:rCloV,bilan_clo:rBilanC,histo_clo:rHClo,mes_liv:rLivV,bilan_liv:rBilanL,histo_liv:rHLiv};document.getElementById('main').innerHTML=(M[tab]||rDB)();}
function filtrePicker(){const today=new Date().toISOString().split('T')[0];const df=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];return `<div class="card"><div class="ch">📅 Période</div><div class="cb"><div class="g2" style="margin-bottom:10px"><div class="fr"><label>Du</label><input type="date" id="ff" value="${fFrom||df}"></div><div class="fr"><label>Au</label><input type="date" id="ft" value="${fTo||today}"></div></div><div style="display:flex;gap:8px"><button class="btn bp" style="flex:1" onclick="applyF()">📊 Appliquer</button><button class="btn" onclick="resetF()">✕ Tout</button></div></div></div>`;}
function rDB(){const list=fd(orders);const tot=list.length,liv=list.filter(o=>o.statut==='Livrée ✓').length,ref=list.filter(o=>o.statut==='Refusée').length,ann=list.filter(o=>o.statut==='Annulée').length;const ca=list.filter(o=>o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte-o.frais,0);const tx=tot>0?Math.round(liv/tot*100):0,ec=list.filter(o=>!['Livrée ✓','Refusée','Annulée'].includes(o.statut)).length;const today=new Date().toISOString().split('T')[0],df=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];return `${filtrePicker()}<div class="kg"><div class="kpi" style="border-top-color:var(--ac)"><div class="kl">Commandes</div><div class="kv">${tot}</div><div class="ks">${ec} en cours</div></div><div class="kpi" style="border-top-color:var(--gr)"><div class="kl">CA net</div><div class="kv">${fmt(ca)}</div><div class="ks">${liv} livrées</div></div><div class="kpi" style="border-top-color:var(--gr)"><div class="kl">Taux livraison</div><div class="kv">${tx}%</div><div class="ks">&gt;80% objectif</div></div><div class="kpi" style="border-top-color:var(--re)"><div class="kl">Refus+Annul.</div><div class="kv">${ref+ann}</div><div class="ks">${tot>0?Math.round((ref+ann)/tot*100):0}%</div></div></div><div class="card"><div class="ch">🔴 Actions requises <span style="background:var(--re2);color:#FF8FAA;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">${list.filter(o=>['En attente','Confirmée'].includes(o.statut)).length}</span></div>${list.filter(o=>['En attente','Confirmée'].includes(o.statut)).length===0?'<div class="empty">✓ Aucune action requise</div>':`<div class="tw"><table><tr><th>ID</th><th>Client</th><th>Ville</th><th>Montant</th><th>Statut</th><th></th></tr>${list.filter(o=>['En attente','Confirmée'].includes(o.statut)).map(o=>`<tr><td style="font-size:10px;color:#555">${esc(o.id)}</td><td><strong>${esc(o.client)}</strong></td><td>${esc(o.ville)}</td><td><strong>${fmt(o.prix*o.qte)}</strong></td><td>${badge(o.statut)}</td><td><button class="btn bsm bp" onclick="openAsgn('${esc(o.id)}')">Assigner</button></td></tr>`).join('')}</table></div>`}</div><div class="card"><div class="ch">📊 Par statut</div><div class="cb" style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${Object.keys(STM).map(s=>{const n=list.filter(o=>o.statut===s).length;if(!n)return '';const p=tot>0?Math.round(n/tot*100):0;return `<div style="padding:10px;background:var(--bg3);border-radius:var(--rs)">${badge(s)}<div style="font-size:20px;font-weight:800;margin-top:4px">${n}</div><div style="font-size:10px;color:#555">${p}%</div></div>`;}).join('')}</div></div>`;}
function rCmd(){const list=fd(orders);return `<div class="card"><div class="ch">📋 Commandes <span style="background:rgba(124,111,255,.15);color:#B3A8FF;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700">${list.length}</span></div><div class="tw"><table><tr><th>ID</th><th>Client</th><th>Produit</th><th>Montant</th><th>Closeur</th><th>Livreur</th><th>Statut</th><th></th></tr>${list.length===0?'<tr><td colspan="8"><div class="empty">Aucune commande</div></td></tr>':''}${list.map(o=>`<tr><td style="font-size:10px;color:#555">${esc(o.id)}</td><td><strong>${esc(o.client)}</strong><br><span style="font-size:10px;color:#555">${esc(o.ville)}</span></td><td style="font-size:11px">${esc(o.produit)} ×${o.qte}</td><td><strong>${fmt(o.prix*o.qte)}</strong></td><td style="font-size:11px">${o.closeur?esc(o.closeur):'<span style="color:var(--re)">—</span>'}</td><td style="font-size:11px">${o.livreur?esc(o.livreur):'<span style="color:#555">—</span>'}</td><td>${badge(o.statut)}</td><td style="white-space:nowrap"><button class="btn bsm" onclick="openAsgn('${esc(o.id)}')">✏️</button> <button class="btn bsm" onclick="openTL('${esc(o.id)}')">🕐</button> <button class="btn bsm bd" onclick="confirmDel('${esc(o.id)}')">🗑️</button></td></tr>`).join('')}</table></div></div>`;}
function rBilanA(){const list=fd(orders);const tot=list.length,liv=list.filter(o=>o.statut==='Livrée ✓').length;const ca=list.filter(o=>o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte-o.frais,0);const tx=tot>0?Math.round(liv/tot*100):0;return filtrePicker()+`<div class="kg"><div class="kpi" style="border-top-color:var(--ac)"><div class="kl">Total</div><div class="kv">${tot}</div></div><div class="kpi" style="border-top-color:var(--gr)"><div class="kl">CA net</div><div class="kv">${fmt(ca)}</div></div><div class="kpi" style="border-top-color:var(--gr)"><div class="kl">Taux</div><div class="kv">${tx}%</div></div><div class="kpi" style="border-top-color:var(--re)"><div class="kl">Non livrées</div><div class="kv">${tot-liv}</div></div></div><div class="card"><div class="ch">📋 Détail</div><div class="tw"><table><tr><th>ID</th><th>Date</th><th>Client</th><th>Closeur</th><th>Livreur</th><th>Montant</th><th>Statut</th></tr>${list.map(o=>`<tr><td style="font-size:10px;color:#555">${esc(o.id)}</td><td style="font-size:11px">${esc(o.date)}</td><td>${esc(o.client)}</td><td style="font-size:11px">${esc(o.closeur)||'—'}</td><td style="font-size:11px">${esc(o.livreur)||'—'}</td><td><strong>${fmt(o.prix*o.qte)}</strong></td><td>${badge(o.statut)}</td></tr>`).join('')||'<tr><td colspan="7"><div class="empty">Aucune commande sur cette période</div></td></tr>'}</table></div></div>`;}
function rClP(){const noms=[...new Set(orders.map(o=>o.closeur).filter(Boolean))];if(!noms.length)return '<div class="empty">Aucune donnée closeur</div>';return `<div class="card"><div class="ch">📞 Performance closeurs</div><div class="tw"><table><tr><th>Closeur</th><th>Assignées</th><th>Confirmées</th><th>Annulées</th><th>Taux</th><th>CA</th></tr>${noms.map(cl=>{const a=orders.filter(o=>o.closeur===cl).length;const c=orders.filter(o=>o.closeur===cl&&['Confirmée','Assignée livreur','En livraison','Livrée ✓'].includes(o.statut)).length;const ann=orders.filter(o=>o.closeur===cl&&o.statut==='Annulée').length;const ca=orders.filter(o=>o.closeur===cl&&o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte,0);const t=a>0?Math.round(c/a*100):0;const col=t>=75?'var(--gr)':t>=50?'var(--am)':'var(--re)';return `<tr><td><strong>${esc(cl)}</strong></td><td>${a}</td><td>${c}</td><td>${ann}</td><td style="color:${col};font-weight:700">${t}%<div class="bar-bg"><div class="bar" style="width:${t}%;background:${col}"></div></div></td><td><strong>${fmt(ca)}</strong></td></tr>`;}).join('')}</table></div></div>`;}
function rLvP(){const noms=[...new Set(orders.map(o=>o.livreur).filter(Boolean))];if(!noms.length)return '<div class="empty">Aucune donnée livreur</div>';return `<div class="card"><div class="ch">🚚 Performance livreurs</div><div class="tw"><table><tr><th>Livreur</th><th>Assignées</th><th>Livrées</th><th>Refusées</th><th>Taux</th><th>CA</th></tr>${noms.map(lv=>{const a=orders.filter(o=>o.livreur===lv).length;const l=orders.filter(o=>o.livreur===lv&&o.statut==='Livrée ✓').length;const r=orders.filter(o=>o.livreur===lv&&o.statut==='Refusée').length;const ca=orders.filter(o=>o.livreur===lv&&o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte,0);const t=a>0?Math.round(l/a*100):0;const col=t>=80?'var(--gr)':t>=60?'var(--am)':'var(--re)';return `<tr><td><strong>${esc(lv)}</strong></td><td>${a}</td><td>${l}</td><td>${r}</td><td style="color:${col};font-weight:700">${t}%<div class="bar-bg"><div class="bar" style="width:${t}%;background:${col}"></div></div></td><td><strong>${fmt(ca)}</strong></td></tr>`;}).join('')}</table></div></div>`;}
function rMot(){function ch(list,col){if(!list.length)return '<div class="empty">Aucun motif</div>';const cnt={};list.forEach(o=>{if(o.motif)cnt[o.motif]=(cnt[o.motif]||0)+1;});const mx=Math.max(...Object.values(cnt));return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([m,n])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${esc(m)}</span><strong>${n}</strong></div><div class="bar-bg"><div class="bar" style="width:${Math.round(n/mx*100)}%;background:${col}"></div></div></div>`).join('');}return `<div class="card"><div class="ch">✕ Refus <span style="background:var(--re2);color:#FF8FAA;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">${orders.filter(o=>o.statut==='Refusée').length}</span></div><div class="cb">${ch(orders.filter(o=>o.statut==='Refusée'),'var(--re)')}</div></div><div class="card"><div class="ch">✕ Annulations <span style="background:rgba(100,100,130,.15);color:#888;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">${orders.filter(o=>o.statut==='Annulée').length}</span></div><div class="cb">${ch(orders.filter(o=>o.statut==='Annulée'),'#888')}</div></div>`;}



function rPar(){const sheetUrl=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;return `<div class="card"><div class="ch">⚙️ Statut système</div><div class="cb"><div class="aok">✅ Google Sheets — ${orders.length} commandes | ${cfg.produits.length} produits | ${cfg.closeurs.length} closeurs | ${cfg.livreurs.length} livreurs</div><div class="aok">✅ Google Apps Script actif — écriture directe dans le Sheet</div><div class="aok">✅ Données centralisées — identiques sur tous les appareils</div><div style="margin-top:12px;padding:12px;background:var(--bg3);border-radius:var(--rs);font-size:12px;color:#888;line-height:1.8"><strong style="color:var(--t);display:block;margin-bottom:6px">📋 Comment ajouter des commandes :</strong>1. Shopify → Make.com → Sheet automatiquement<br>2. Commande manuelle → <a href="${sheetUrl}" target="_blank" style="color:var(--ac)">Ouvre ton Google Sheet</a> → feuille COMMANDES → ajoute une ligne<br>3. L'app se met à jour automatiquement dans les 60 secondes</div></div></div><div class="card"><div class="ch">💱 Devise</div><div class="cb"><p style="font-size:12px;color:#555;margin-bottom:12px">Devise : <strong style="color:var(--t)">${CC} — ${cur().n}</strong></p><button class="btn bp" onclick="openCurModal()">💱 Changer</button></div></div><div class="card"><div class="ch">🔗 Liens personnalisés</div><div class="cb"><div class="slbl">📞 Closeurs</div>${cfg.closeurs.map(c=>`<div style="margin-bottom:10px"><div style="font-size:11px;color:#555;margin-bottom:4px;font-weight:600">${esc(c.nom)}</div><div class="ubox" onclick="copyU(this)">${location.origin+location.pathname}?role=closeur&nom=${encodeURIComponent(c.nom)}</div></div>`).join('')||'<div class="empty">Aucun closeur</div>'}<div class="slbl">🚚 Livreurs</div>${cfg.livreurs.map(l=>`<div style="margin-bottom:10px"><div style="font-size:11px;color:#555;margin-bottom:4px;font-weight:600">${esc(l.nom)} — ${esc(l.ville)}</div><div class="ubox" onclick="copyU(this)">${location.origin+location.pathname}?role=livreur&nom=${encodeURIComponent(l.nom)}</div></div>`).join('')||'<div class="empty">Aucun livreur</div>'}</div></div>`;}
function copyU(el){navigator.clipboard.writeText(el.textContent.trim()).then(()=>toast('✓ Lien copié !'));}

<div style="margin:10px 0;background:var(--bg2);border:1px solid rgba(124,111,255,.3);border-radius:var(--rs);padding:12px">

  ${o.noteLiv?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--b)"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#555;margin-bottom:4px">📝 Note de la closeur</div><div style="font-size:13px;color:var(--t);line-height:1.5">${esc(o.noteLiv)}</div></div>`:''}
</div>
<div class="cod"><div><div class="codlbl">Montant COD à collecter</div><div class="codamt">${fmt(o.prix*o.qte)}</div></div><div style="text-align:right"><div class="codlbl">Ta commission</div><div style="font-size:20px;font-weight:800;color:var(--ac)">${fmt(o.frais)}</div></div></div><div class="arow">${o.statut!=='En livraison'?`<button class="btn bw" onclick="updSt('${esc(o.id)}','En livraison');toast('🚗 En route')">🚗 En route</button>`:''} <button class="btn bs" style="flex:1" onclick="openConfirmLiv('${esc(o.id)}')">✓ Livrée et COD collecté</button> <button class="btn bd" onclick="openRefusLiv('${esc(o.id)}')">✕ Refusée</button></div></div>`).join('')}`;}
function rBilanC(){const moi=UNOM||cfg.closeurs[0]?.nom||'';const list=fd(orders.filter(o=>o.closeur===moi));const liv=list.filter(o=>o.statut==='Livrée ✓').length,ann=list.filter(o=>o.statut==='Annulée').length;const cl=cfg.closeurs.find(x=>x.nom===moi);const comm=0;const tx=list.length>0?Math.round(liv/list.length*100):0;return filtrePicker()+`<div class="kg"><div class="kpi" style="border-top-color:var(--ac)"><div class="kl">Total</div><div class="kv">${list.length}</div></div><div class="kpi" style="border-top-color:var(--gr)"><div class="kl">Confirmées</div><div class="kv">${liv}</div></div><div class="kpi" style="border-top-color:var(--re)"><div class="kl">Annulées</div><div class="kv">${ann}</div></div><div class="kpi" style="border-top-color:var(--ac)"><div class="kl">Taux confirm.</div><div class="kv">${tx}%</div></div></div><div class="card"><div class="ch">Taux confirmation : <strong style="color:${tx>=75?'var(--gr)':'var(--re)'}">${tx}%</strong></div><div class="tw"><table><tr><th>ID</th><th>Date</th><th>Client</th><th>Montant</th><th>Statut</th><th>Motif</th></tr>${list.map(o=>`<tr><td style="font-size:10px;color:#555">${esc(o.id)}</td><td style="font-size:11px">${esc(o.date)}</td><td>${esc(o.client)}</td><td>${fmt(o.prix*o.qte)}</td><td>${badge(o.statut)}</td><td style="font-size:11px;color:#FF8FAA">${esc(o.motif)||'—'}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">Aucune donnée</div></td></tr>'}</table></div></div>`;}
function rBilanL(){const moi=UNOM||cfg.livreurs[0]?.nom||'';const list=fd(orders.filter(o=>o.livreur===moi));const liv=list.filter(o=>o.statut==='Livrée ✓').length,ref=list.filter(o=>o.statut==='Refusée').length;const lv=cfg.livreurs.find(x=>x.nom===moi);const comm=list.filter(o=>o.statut==='Livrée ✓').reduce((s,o)=>s+(lv?.frais||3.5),0);const tx=list.length>0?Math.round(liv/list.length*100):0;return filtrePicker()+`<div class="kg"><div class="kpi" style="border-top-color:var(--ac)"><div class="kl">Total</div><div class="kv">${list.length}</div></div><div class="kpi" style="border-top-color:var(--gr)"><div class="kl">Livrées</div><div class="kv">${liv}</div></div><div class="kpi" style="border-top-color:var(--re)"><div class="kl">Refusées</div><div class="kv">${ref}</div></div><div class="kpi" style="border-top-color:var(--am)"><div class="kl">Mes commissions</div><div class="kv">${fmt(comm)}</div></div></div><div class="card"><div class="ch">Taux de succès : <strong style="color:${tx>=80?'var(--gr)':'var(--re)'}">${tx}%</strong></div><div class="tw"><table><tr><th>ID</th><th>Date</th><th>Client</th><th>COD collecté</th><th>Commission</th><th>Résultat</th></tr>${list.map(o=>`<tr><td style="font-size:10px;color:#555">${esc(o.id)}</td><td style="font-size:11px">${esc(o.date)}</td><td>${esc(o.client)}</td><td><strong>${o.statut==='Livrée ✓'?fmt(o.prix*o.qte):'—'}</strong></td><td style="color:var(--gr)">${o.statut==='Livrée ✓'?fmt(lv?.frais||3.5):'—'}</td><td>${badge(o.statut)}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">Aucune donnée</div></td></tr>'}</table></div></div>`;}
function rHClo(){const moi=UNOM||cfg.closeurs[0]?.nom||'';const hist=orders.filter(o=>o.closeur===moi&&['Livrée ✓','Annulée','Refusée'].includes(o.statut));return `<div class="card"><div class="ch">🕐 Historique</div><div class="tw"><table><tr><th>ID</th><th>Date</th><th>Client</th><th>Montant</th><th>Statut</th><th>Motif</th></tr>${hist.map(o=>`<tr><td style="font-size:10px;color:#555">${esc(o.id)}</td><td style="font-size:11px">${esc(o.date)}</td><td>${esc(o.client)}</td><td>${fmt(o.prix*o.qte)}</td><td>${badge(o.statut)}</td><td style="font-size:11px;color:#FF8FAA">${esc(o.motif)||'—'}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">Aucun historique</div></td></tr>'}</table></div></div>`;}
function rHLiv(){const moi=UNOM||cfg.livreurs[0]?.nom||'';const hist=orders.filter(o=>o.livreur===moi&&['Livrée ✓','Refusée'].includes(o.statut));return `<div class="card"><div class="ch">✓ Historique livraisons</div><div class="tw"><table><tr><th>ID</th><th>Date</th><th>Client</th><th>COD</th><th>Résultat</th><th>Motif</th></tr>${hist.map(o=>`<tr><td style="font-size:10px;color:#555">${esc(o.id)}</td><td style="font-size:11px">${esc(o.date)}</td><td>${esc(o.client)}</td><td><strong>${fmt(o.prix*o.qte)}</strong></td><td>${badge(o.statut)}</td><td style="font-size:11px;color:#FF8FAA">${esc(o.motif)||'—'}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">Aucun historique</div></td></tr>'}</table></div></div>`;}
function openAsgn(id){const o=orders.find(x=>x.id===id);const lvs=cfg.livreurs.filter(l=>!o.ville||l.ville===o.ville);openModal(`<h3>✏️ Modifier — ${esc(id)}</h3><p class="msub">${esc(o.client)} · ${esc(o.ville)} · ${badge(o.statut)}</p><div class="fr"><label>Closeur</label><select id="mcl"><option value="">— Non assigné —</option>${cfg.closeurs.map(c=>`<option ${o.closeur===c.nom?'selected':''}>${c.nom}</option>`).join('')}</select></div><div class="fr"><label>Livreur</label><select id="mlv"><option value="">— Non assigné —</option>${(lvs.length?lvs:cfg.livreurs).map(l=>`<option ${o.livreur===l.nom?'selected':''}>${l.nom}</option>`).join('')}</select></div><div class="fr"><label>Statut</label><select id="mst">${Object.keys(STM).map(s=>`<option ${o.statut===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="mbtns"><button class="btn" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn bp" style="flex:1" onclick="saveAsgn('${esc(id)}')">Enregistrer</button></div>`);}
async function saveAsgn(id){
  const cl=document.getElementById('mcl')?.value;
  const lv=document.getElementById('mlv')?.value;
  const st=document.getElementById('mst')?.value;
  const o=orders.find(x=>x.id===id);
  if(cl&&cl!==o.closeur)await asgClo(id,cl);
  if(lv&&lv!==o.livreur)await asgLiv(id,lv);
  if(st&&st!==o.statut)await updSt(id,st,'');
  closeModal();
  toast('✓ Mis à jour');
  // Retour auto selon le rôle
  if(role==='closeur') swTab('mes_cmd');
  else if(role==='livreur') swTab('mes_liv');
}
function openAsgLiv(id){
  const o=orders.find(x=>x.id===id);
  const lvs=cfg.livreurs.filter(l=>!o.ville||l.ville===o.ville);
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr=tomorrow.toISOString().split('T')[0];
  openModal(`<h3>🚚 Assigner livreur</h3>
    <p class="msub">${esc(o.client)} · ${esc(o.ville)}</p>
    <div class="fr"><label>Livreur</label>
      <select id="mlv2">${(lvs.length?lvs:cfg.livreurs).map(l=>`<option>${l.nom}</option>`).join('')}</select>
    </div>
    <div class="g2">
      <div class="fr"><label>📅 Date de livraison</label>
        <input type="date" id="dliv" value="${tomorrowStr}">
      </div>
      <div class="fr"><label>🕐 Heure prévue</label>
        <input type="time" id="hliv" value="10:00">
      </div>
    </div>
    <div class="fr"><label>📍 Quartier / Adresse de livraison</label>
      <input id="quartier" placeholder="Ex: Bonapriso, près du marché central..." value="${esc(o.quartier||o.ville||'')}">
      ${o.quartier?`<div style="font-size:10px;color:#555;margin-top:3px">ℹ️ Adresse fournie par le client — modifie si le client a changé</div>`:''}
    </div>
    <div class="fr"><label>📝 Note pour le livreur</label>
      <textarea id="noteliv" placeholder="Ex: Appeler avant d'arriver, immeuble bleu..." style="min-height:60px">${esc(o.noteLiv||'')}</textarea>
    </div>
    <div class="mbtns">
      <button class="btn" style="flex:1" onclick="closeModal()">Annuler</button>
      <button class="btn bp" style="flex:1" onclick="doAsgLiv('${esc(id)}')">✓ Confirmer</button>
    </div>`);}
async function doAsgLiv(id){
  const lv=document.getElementById('mlv2')?.value;
  const dliv=document.getElementById('dliv')?.value||'';
  const hliv=document.getElementById('hliv')?.value||'';
  const note=document.getElementById('noteliv')?.value||'';
  const qtier=document.getElementById('quartier')?.value||'';
  const o=orders.find(x=>x.id===id);
  if(o){
    o.livreur=lv;
    o.statut='Assignée livreur';
    o.dateLiv=dliv;
    o.heureLiv=hliv;
    o.noteLiv=note;
    o.quartier=qtier;
    if(qtier) o.ville=o.ville+(qtier?' — '+qtier:'');
  }
  await post({action:'ASSIGN_LIVREUR',cmdId:id,livreurNom:lv,dateLiv:dliv,heureLiv:hliv,noteLiv:note,quartier:qtier});
  closeModal();
  render();
  toast(`🚚 Livraison planifiée — ${dliv} à ${hliv}`);
  // Retour auto sur mes commandes
  setTimeout(()=>swTab('mes_cmd'), 1500);
  // Envoie rappel WhatsApp au client
  if(o && o.tel && dliv){
    const msg=`Bonjour ${o.client} ! 👋

Votre commande *${o.produit}* sera livrée le *${dliv}* à *${hliv}*.

Montant à préparer : *${fmt(o.prix*o.qte)}*

Merci de votre confiance ! 🙏`;
    const waUrl=`https://wa.me/${o.tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
    setTimeout(()=>{
      if(confirm('Envoyer le rappel WhatsApp au client ?')) window.open(waUrl,'_blank');
    },500);
  }
}
function openTL(id){const o=orders.find(x=>x.id===id);const steps=[{c:'#7C6FFF',t:'Commande créée',d:o.date},o.closeur&&{c:'#FFB547',t:'Closeur assigné',d:o.closeur},['Confirmée','Assignée livreur','En livraison','Livrée ✓'].includes(o.statut)&&{c:'#00C896',t:'Confirmée'},o.livreur&&{c:'#FB923C',t:'Livreur assigné',d:o.livreur},['En livraison','Livrée ✓'].includes(o.statut)&&{c:'#FFB547',t:'En livraison'},o.statut==='Livrée ✓'&&{c:'#00C896',t:'✓ Livrée — COD collecté'},o.motif&&{c:'#FF5C7A',t:o.statut,d:o.motif}].filter(Boolean);openModal(`<h3>🕐 Suivi — ${esc(id)}</h3><p class="msub">${esc(o.client)} · ${esc(o.produit)} · <strong>${fmt(o.prix*o.qte)}</strong></p>${steps.map(s=>`<div style="display:flex;gap:12px;margin-bottom:14px"><div style="width:10px;height:10px;border-radius:50%;background:${s.c};flex-shrink:0;margin-top:4px"></div><div style="font-size:12px;color:#666"><strong style="color:var(--t)">${esc(s.t)}</strong>${s.d?`<br>${esc(s.d)}`:''}</div></div>`).join('')}<div style="text-align:center;margin:10px 0">${badge(o.statut)}</div>${o.motif?`<div style="background:var(--re2);border-radius:var(--rs);padding:10px 13px;font-size:12px;color:#FF8FAA;margin-top:8px"><strong style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;opacity:.6">Motif</strong>${esc(o.motif)}</div>`:''}<div class="mbtns"><button class="btn" style="flex:1" onclick="closeModal()">Fermer</button></div>`);}
function confirmDel(id){const o=orders.find(x=>x.id===id);openModal(`<h3>🗑️ Supprimer ?</h3><p class="msub">${esc(o.id)} — ${esc(o.client)}</p><div style="background:var(--re2);border-radius:var(--rs);padding:12px;font-size:12px;color:#FF8FAA;margin-bottom:16px;font-weight:600">⚠️ Action irréversible — supprimée de l'app et du Sheet.</div><div class="mbtns"><button class="btn" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn bd" style="flex:1" onclick="delOrder('${esc(id)}')">🗑️ Supprimer</button></div>`);}
async function delOrder(id){orders=orders.filter(x=>x.id!==id);await post({action:'DELETE_COMMANDE',cmdId:id});closeModal();render();toast('🗑️ Supprimée');}
function openMotif(type,id){const o=orders.find(x=>x.id===id);const mo=type==='ann'?MA:MR;openModal(`<h3>${type==='ann'?'✕ Annuler':'✕ Refusée'}</h3><p class="msub">${esc(o.id)} — ${esc(o.client)}</p><div class="mopts">${mo.map(m=>`<button class="mopt" onclick="selMot(this,'${esc(m)}')">${esc(m)}</button>`).join('')}</div><div class="fr" id="ar" style="display:none"><label>Préciser</label><textarea id="ma" placeholder="Décrivez..."></textarea></div><div class="fr"><label>Commentaire</label><textarea id="mc" style="min-height:56px" placeholder="Infos supplémentaires..."></textarea></div><div class="mbtns"><button class="btn" style="flex:1" onclick="closeModal()">Retour</button><button class="btn bd" style="flex:1" onclick="submitMot('${type}','${esc(id)}')">Enregistrer</button></div>`);}
function selMot(btn,val){document.querySelectorAll('.mopt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');btn.dataset.val=val;const ar=document.getElementById('ar');if(ar)ar.style.display=val==='Autre'?'block':'none';}
async function submitMot(type,id){const sel=document.querySelector('.mopt.sel');if(!sel){toast('⚠️ Sélectionne un motif');return;}const base=sel.dataset.val;const autre=document.getElementById('ma')?.value||'';const comment=document.getElementById('mc')?.value||'';const motif=(base==='Autre'?autre||'Autre':base)+(comment?` — ${comment}`:'');await updSt(id,type==='ann'?'Annulée':'Refusée',motif);closeModal();toast('Motif enregistré');}
function openConfirmLiv(id){
  const o=orders.find(x=>x.id===id);
  openModal(`<h3>✅ Confirmer la livraison</h3>
    <p class="msub">${esc(o.client)} · ${esc(o.ville)}</p>
    <div class="cod">
      <div><div class="codlbl">Montant COD à remettre</div><div class="codamt">${fmt(o.prix*o.qte)}</div></div>
    </div>
    <div class="fr"><label>💰 Tes frais de livraison</label>
      <input type="number" id="fraisLiv" placeholder="Ex: 1000" min="0" style="font-size:16px;font-weight:700;text-align:center">
    </div>
    <div style="background:var(--am2);border:1px solid rgba(255,181,71,.2);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:#FFD080;margin-bottom:8px">
      ⚠️ Entre tes frais avant de confirmer — tu ne pourras plus modifier après.
    </div>
    <div class="fr"><label>📝 Commentaire (optionnel)</label>
      <textarea id="noteLivFin" placeholder="Ex: Livré au voisin, client absent..." style="min-height:54px"></textarea>
    </div>
    <div class="mbtns">
      <button class="btn" style="flex:1" onclick="closeModal()">Annuler</button>
      <button class="btn bs" style="flex:1" onclick="confirmerLivraison('${esc(id)}')">✅ Confirmer</button>
    </div>`);
}

async function confirmerLivraison(id){
  const frais=document.getElementById('fraisLiv')?.value||'';
  const note=document.getElementById('noteLivFin')?.value||'';
  if(!frais||parseFloat(frais)<=0){toast('⚠️ Entre tes frais de livraison');return;}
  const o=orders.find(x=>x.id===id);
  if(o){o.frais=parseFloat(frais);o.statut='Livrée ✓';o.motif=note;}
  await post({action:'CONFIRM_LIVRAISON',cmdId:id,statut:'Livrée ✓',frais:frais,motif:note});
  closeModal();
  render();
  toast('✅ Livraison confirmée ! Frais: '+frais);
  setTimeout(()=>swTab('mes_liv'), 1500);
}

function openRefusLiv(id){
  const o=orders.find(x=>x.id===id);
  openModal(`<h3>✕ Livraison non effectuée</h3>
    <p class="msub">${esc(o.client)} · ${esc(o.ville)}</p>
    <div style="display:grid;gap:10px;margin:14px 0">
      <button class="btn" style="padding:14px;background:var(--re2);border:2px solid rgba(255,92,122,.4);color:#FF8FAA;border-radius:var(--r);font-size:13px;font-weight:700;text-align:left" onclick="openMotif('ref','${esc(id)}');closeModal()">
        ❌ Refus définitif
        <div style="font-size:11px;font-weight:400;opacity:.7;margin-top:4px">Le client ne veut plus — commande fermée</div>
      </button>
      <button class="btn" style="padding:14px;background:rgba(255,50,50,.15);border:2px solid rgba(255,50,50,.4);color:#FF3333;border-radius:var(--r);font-size:13px;font-weight:700;text-align:left" onclick="marquerARappeler('${esc(id)}')">
        🔴 Client à rappeler
        <div style="font-size:11px;font-weight:400;opacity:.7;margin-top:4px">La closeur sera alertée pour rappeler le client</div>
      </button>
    </div>
    <div class="fr"><label>Motif / Note pour la closeur</label>
      <textarea id="motifRappel" placeholder="Ex: Client absent, pas répondu, mauvaise adresse..." style="min-height:60px"></textarea>
    </div>
    <div class="mbtns">
      <button class="btn" style="flex:1" onclick="closeModal()">Annuler</button>
    </div>`);
}

async function marquerARappeler(id){
  const motif=document.getElementById('motifRappel')?.value||'';
  localUp(id,{statut:'À rappeler',motif:motif});
  await post({action:'UPDATE_STATUT',cmdId:id,statut:'À rappeler',motif:motif});
  closeModal();
  render();
  toast('🔴 Closeur alertée pour rappeler le client');
  setTimeout(()=>swTab('mes_liv'),1500);
}

async function init(){
  document.getElementById('clbl').textContent=CC;
  if(UROLE&&['closeur','livreur'].includes(UROLE)){
    role=UROLE;tab=role==='closeur'?'mes_cmd':'mes_liv';
    document.getElementById('rbar').style.display='none';
  }
  ss('l');
  try{cfg=await loadConfig();console.log(`✅ Config: ${cfg.produits.length}P | ${cfg.closeurs.length}C | ${cfg.livreurs.length}L`);}
  catch(e){console.error('Config:',e.message);}
  try{orders=await loadOrders();ss('');console.log(`✅ ${orders.length} commandes`);}
  catch(e){ss('e');console.error('Orders:',e.message);}
  render();
  // Rafraîchissement toutes les 60s
  setInterval(async()=>{
    try{const[o,c]=await Promise.all([loadOrders(),loadConfig()]);orders=o;cfg=c;ss('');render();}
    catch(e){ss('e');}
  },60000);

  // Vérification notifications toutes les 5 minutes
  checkNotifications();
  setInterval(checkNotifications, 300000);
}

// ═══════════════════════════════════════
//  NOTIFICATIONS LIVRAISONS
// ═══════════════════════════════════════
function checkNotifications(){
  const moi = UNOM || '';
  if(!moi) return; // Seulement pour closeur/livreur connectés

  const today = new Date().toISOString().split('T')[0];
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = tomorrow.toISOString().split('T')[0];

  // Commandes avec livraison aujourd'hui ou demain
  const upcoming = orders.filter(o => {
    if(!o.dateLiv) return false;
    if(o.statut === 'Livrée ✓') return false;
    const isMyClo = o.closeur === moi;
    const isMyLiv = o.livreur === moi;
    if(!isMyClo && !isMyLiv) return false;
    return o.dateLiv === today || o.dateLiv === tomorrowStr;
  });

  if(upcoming.length === 0) return;

  // Affiche notification dans l'app
  const notifDiv = document.getElementById('notif-bar');
  if(notifDiv) notifDiv.remove();

  const bar = document.createElement('div');
  bar.id = 'notif-bar';
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:linear-gradient(135deg,#7C6FFF,#C084FC);color:#fff;padding:10px 16px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.4)';
  
  const today_count = upcoming.filter(o=>o.dateLiv===today).length;
  const tomorrow_count = upcoming.filter(o=>o.dateLiv===tomorrowStr).length;
  
  let msg = '🔔 ';
  if(today_count) msg += `${today_count} livraison(s) AUJOURD'HUI`;
  if(today_count && tomorrow_count) msg += ' · ';
  if(tomorrow_count) msg += `${tomorrow_count} livraison(s) DEMAIN`;
  
  bar.innerHTML = `<span>${msg}</span><button onclick="this.parentElement.remove()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700">✕</button>`;
  document.body.prepend(bar);

  // Auto-hide après 10 secondes
  setTimeout(()=>bar?.remove(), 10000);
}

init();
</script>
