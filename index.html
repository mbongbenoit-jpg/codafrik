<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0F">
<title>CodAfrik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0F;--bg2:#12121A;--bg3:#1C1C28;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#F0F0F8;--text2:#7878A0;--text3:#444460;
  --accent:#6C63FF;--accent2:#4F46E5;
  --green:#10B981;--green2:rgba(16,185,129,.15);
  --amber:#F59E0B;--amber2:rgba(245,158,11,.15);
  --red:#EF4444;--red2:rgba(239,68,68,.15);
  --blue:#3B82F6;--blue2:rgba(59,130,246,.15);
  --r:12px;--rs:8px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:700;background:linear-gradient(135deg,#6C63FF,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.currency-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;margin-left:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:auto}
.sync-dot.err{background:var(--red)}
.sync-dot.load{background:var(--amber);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ROLE BAR */
.role-bar{background:var(--bg);border-bottom:1px solid var(--border);display:flex;padding:5px;gap:4px}
.rb{flex:1;padding:8px 4px;border-radius:var(--rs);border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .2s}
.rb.active{color:#fff}
.rb.r-admin.active{background:var(--accent2)}
.rb.r-closeur.active{background:#B45309}
.rb.r-livreur.active{background:#065F46}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{padding:10px 13px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:all .15s}
.nb.active{color:var(--accent);border-bottom-color:var(--accent)}
.pill{background:var(--red);color:#fff;border-radius:9px;font-size:10px;padding:1px 5px;margin-left:3px;vertical-align:middle}

/* CONTENT */
.content{padding:12px;flex:1;max-width:740px;margin:0 auto;width:100%}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;border-top:3px solid}
.kl{font-size:11px;color:var(--text2);margin-bottom:3px}
.kv{font-size:22px;font-weight:700}
.ks{font-size:11px;color:var(--text2);margin-top:2px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.ch{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;flex-wrap:wrap}
.cb{padding:14px}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:460px}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* STATUS */
.st{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.s0{background:var(--blue2);color:#93C5FD}
.s1{background:rgba(108,99,255,.15);color:#A78BFA}
.s2{background:var(--amber2);color:#FCD34D}
.s3{background:var(--green2);color:#6EE7B7}
.s4{background:rgba(251,146,60,.15);color:#FDBA74}
.s5{background:var(--amber2);color:#FCD34D}
.s6{background:rgba(16,185,129,.2);color:#34D399;font-weight:700}
.s7{background:var(--red2);color:#FCA5A5}
.s8{background:rgba(100,100,120,.2);color:#9CA3AF}

/* BUTTONS */
.btn{padding:7px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--text);font-family:inherit;font-weight:500;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-s{background:var(--green2);border-color:rgba(16,185,129,.4);color:#6EE7B7}
.btn-w{background:var(--amber2);border-color:rgba(245,158,11,.4);color:#FCD34D}
.btn-d{background:var(--red2);border-color:rgba(239,68,68,.4);color:#FCA5A5}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-bl{width:100%;justify-content:center;padding:12px;border-radius:var(--r)}
.arow{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* FORM */
.fr{margin-bottom:10px}
.fr label{font-size:10px;color:var(--text2);display:block;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fr input,.fr select,.fr textarea{width:100%;padding:9px 11px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;font-size:13px;transition:border-color .15s;-webkit-appearance:none}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:var(--accent)}
.fr textarea{resize:none;min-height:68px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* CMD CARD */
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ci{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.5px}
.cd{font-size:12px;color:var(--text2);margin-bottom:4px}
.cd strong{color:var(--text)}
.ctel{font-size:14px;font-weight:700;color:var(--accent);text-decoration:none;display:block;margin:6px 0}
.cod{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.cod-amt{font-size:26px;font-weight:800;color:var(--green)}
.cod-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:18px 16px 34px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.mh{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:14px;font-weight:700;margin-bottom:5px}
.msub{font-size:12px;color:var(--text2);margin-bottom:14px}
.mbtns{display:flex;gap:8px;margin-top:14px}

/* MOTIF */
.mopts{display:grid;gap:5px;margin-bottom:8px}
.mopt{padding:9px 11px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--text);text-align:left;width:100%;font-family:inherit;transition:all .15s}
.mopt.sel{border-color:var(--accent);background:rgba(108,99,255,.15);color:#A78BFA}

/* MISC */
.empty{text-align:center;padding:28px;color:var(--text2);font-size:13px}
.loader{text-align:center;padding:36px;color:var(--text2);font-size:13px}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:var(--r);font-size:13px;z-index:200;white-space:nowrap;animation:tIn .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)}
@keyframes tIn{from{transform:translateX(-50%) translateY(14px);opacity:0}}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.bar-bg{background:var(--bg3);border-radius:3px;height:5px;margin-top:3px}
.bar{height:5px;border-radius:3px;transition:width .5s}
.alert{border-radius:var(--rs);padding:10px 12px;font-size:12px;margin-bottom:10px}
.alert-ok{background:var(--green2);color:#6EE7B7;border:1px solid rgba(16,185,129,.3)}
.alert-warn{background:var(--amber2);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:11px;font-family:monospace;color:#A78BFA;word-break:break-all}
.url-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;font-size:11px;font-family:monospace;color:var(--accent);word-break:break-all;margin:5px 0;cursor:pointer}
.section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin:14px 0 6px}
@media(min-width:500px){.kpi-grid{grid-template-columns:repeat(4,1fr)}.modal{border-radius:16px;margin-bottom:20px}.mbg{align-items:center}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="logo">CodAfrik</div>
  <span class="currency-badge" onclick="openCurrencyModal()" title="Changer la devise">💱 <span id="cur-lbl">USD</span></span>
  <div class="sync-dot" id="sdot"></div>
</div>
<div class="role-bar" id="rbar">
  <button class="rb r-admin active" onclick="setRole('admin')">👑 Admin</button>
  <button class="rb r-closeur" onclick="setRole('closeur')">📞 Closeur</button>
  <button class="rb r-livreur" onclick="setRole('livreur')">🚚 Livreur</button>
</div>
<div class="nav" id="nav"></div>
<div class="content" id="content"><div class="loader"><div class="spin"></div>Chargement...</div></div>
<div id="mct"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIGURATION — À MODIFIER
// ══════════════════════════════════════════════════════════════
const SHEET_ID = "1-UoulnD4iOFmZ9M_Thbm8qzeDdBGCFRjinbyIY0Syyc";

// Make.com Webhook URL — pour écrire dans le Sheet
// Laisse vide si pas encore configuré
// Webhook Make.com — intégré directement dans le code (invisible aux utilisateurs)
const MAKE_WEBHOOK = "https://hook.us2.make.com/2nuna5ia2dus1i5iaj49b4ni7twq618u";

// ══════════════════════════════════════════════════════════════
//  DEVISE
// ══════════════════════════════════════════════════════════════
const CURRENCIES = {
  USD: { symbol:'$',  name:'Dollar US',       rate:1 },
  EUR: { symbol:'€',  name:'Euro',            rate:0.92 },
  XOF: { symbol:'F',  name:'Franc CFA (UEMOA)',rate:600 },
  XAF: { symbol:'F',  name:'Franc CFA (CEMAC)',rate:600 },
  MAD: { symbol:'DH', name:'Dirham marocain', rate:9.9 },
  GHS: { symbol:'₵',  name:'Cedi ghanéen',   rate:15.5 },
  NGN: { symbol:'₦',  name:'Naira nigérian',  rate:1600 },
  GNF: { symbol:'FG', name:'Franc guinéen',   rate:8600 },
};

let curCode = localStorage.getItem('CA_CUR') || 'USD';
function cur() { return CURRENCIES[curCode] || CURRENCIES.USD; }
function fmt(usd) {
  const c = cur();
  const val = usd * c.rate;
  if (val >= 1000) return c.symbol + Math.round(val).toLocaleString('fr-FR');
  return c.symbol + val.toFixed(val < 10 ? 2 : 0);
}

function openCurrencyModal() {
  openModal(`
    <h3>💱 Choisir la devise</h3>
    <p class="msub">Tous les montants seront convertis automatiquement</p>
    <div style="display:grid;gap:6px">
      ${Object.entries(CURRENCIES).map(([code,c])=>`
      <button class="mopt ${curCode===code?'sel':''}" onclick="setCurrency('${code}')">
        <strong>${c.symbol} ${code}</strong> — ${c.name}
        ${code!=='USD'?`<span style="font-size:10px;opacity:.6;float:right">1 USD = ${c.rate} ${code}</span>`:''}
      </button>`).join('')}
    </div>
    <div class="mbtns"><button class="btn" style="flex:1" onclick="closeModal()">Fermer</button></div>`);
}

function setCurrency(code) {
  curCode = code;
  localStorage.setItem('CA_CUR', code);
  document.getElementById('cur-lbl').textContent = code;
  closeModal();
  render();
  toast(`Devise : ${CURRENCIES[code].symbol} ${code}`);
}

// ══════════════════════════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════════════════════════
let role = 'admin', tab = 'dashboard';
let orders = [], cfg = {produits:[],paysUniques:[],villesParPays:{},livreurs:[],closeurs:[]};

const UP = new URLSearchParams(location.search);
const URL_ROLE = UP.get('role'), URL_NOM = UP.get('nom')||'';

// ══════════════════════════════════════════════════════════════
//  LECTURE SHEET (CSV public)
// ══════════════════════════════════════════════════════════════
const CSV = n => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`;

function parseCSV(txt) {
  const rows=[];
  for (const line of txt.split('\n')) {
    if (!line.trim()) continue;
    const cells=[]; let cur='',inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=c;
    }
    cells.push(cur.trim()); rows.push(cells);
  }
  return rows;
}

async function fetchCSV(name) {
  const r = await fetch(CSV(name));
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${name}`);
  return parseCSV(await r.text());
}

const C={ID:0,DATE:1,SHOPIFY:2,CLIENT:3,TEL:4,PAYS:5,VILLE:6,PRODUIT:7,QTE:8,PRIX:10,FRAIS:12,CLOSEUR:14,LIVREUR:16,STATUT:19,MOTIF:20,SOURCE:23};

async function loadOrders() {
  const rows = await fetchCSV('📋 COMMANDES');
  return rows.slice(4).filter(r=>r[C.CLIENT]?.trim()).map(r=>({
    id:r[C.ID]||'', date:r[C.DATE]||'', shopify:r[C.SHOPIFY]||'',
    client:r[C.CLIENT]||'', tel:r[C.TEL]||'', pays:r[C.PAYS]||'',
    ville:r[C.VILLE]||'', produit:r[C.PRODUIT]||'',
    qte:parseInt(r[C.QTE])||1,
    prix:parseFloat(String(r[C.PRIX]||'0').replace(',','.'))||0,
    frais:parseFloat(String(r[C.FRAIS]||'0').replace(',','.'))||0,
    closeur:r[C.CLOSEUR]||'', livreur:r[C.LIVREUR]||'',
    statut:r[C.STATUT]||'En attente', motif:r[C.MOTIF]||'',
    source:r[C.SOURCE]||'',
  }));
}

async function loadConfig() {
  const rows = await fetchCSV('⚙️ CONFIGURATION');
  const produits=[],pv=[],livreurs=[],closeurs=[];
  for (const r of rows) {
    const id=(r[0]||'').trim();
    if (!id) continue;
    if (id.startsWith('PRD')&&r[1]) {
      produits.push({id,nom:r[1].trim(),prixVente:parseFloat(String(r[4]||'0').replace(',','.'))||0});
    }
    if (id.startsWith('PV')&&r[1]&&r[2]) {
      const actif=(r[4]||'O').trim();
      if(actif==='O'||actif==='') pv.push({pays:r[1].trim(),ville:r[2].trim()});
    }
    if (id.startsWith('LIV')&&r[1]) {
      const actif=(r[7]||'O').trim();
      if(actif==='O'||actif==='') livreurs.push({
        id,nom:(r[1]+' '+(r[2]||'')).trim(),
        tel:r[3]||'',pays:r[4]||'',ville:r[5]||'',
        frais:parseFloat(String(r[6]||'3.5').replace(',','.'))||3.5,
      });
    }
    if (id.startsWith('CLO')&&r[1]) {
      const actif=(r[6]||'O').trim();
      if(actif==='O'||actif==='') closeurs.push({
        id,nom:(r[1]+' '+(r[2]||'')).trim(),
        tel:r[3]||'',commission:parseFloat(String(r[5]||'3').replace(',','.'))||3,
      });
    }
  }
  const paysUniques=[...new Set(pv.map(p=>p.pays))].filter(Boolean);
  const villesParPays={};
  pv.forEach(p=>{
    if(!villesParPays[p.pays]) villesParPays[p.pays]=[];
    if(!villesParPays[p.pays].includes(p.ville)) villesParPays[p.pays].push(p.ville);
  });
  return {produits,paysUniques,villesParPays,livreurs,closeurs};
}

// ══════════════════════════════════════════════════════════════
//  ÉCRITURE — Make.com Webhook (solution professionnelle)
// ══════════════════════════════════════════════════════════════
async function writeToSheet(payload) {
  const url = MAKE_WEBHOOK || localStorage.getItem('CA_WEBHOOK');
  if (!url) {
    console.log('Make webhook non configuré — sauvegarde locale uniquement');
    return false;
  }
  try {
    await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    return true;
  } catch(e) {
    console.error('Make webhook error:', e.message);
    return false;
  }
}

// ══════════════════════════════════════════════════════════════
//  PERSISTANCE LOCALE (localStorage)
// ══════════════════════════════════════════════════════════════
function saveLocal() {
  try { localStorage.setItem('CA_ORDERS', JSON.stringify(orders)); } catch(e) {}
}
function loadLocal() {
  try { const s=localStorage.getItem('CA_ORDERS'); return s?JSON.parse(s):[]; } catch(e) { return []; }
}

// ══════════════════════════════════════════════════════════════
//  STATUTS & HELPERS
// ══════════════════════════════════════════════════════════════
const ST_MAP = {
  'En attente':'s0','Assignée closeur':'s1','En appel':'s2',
  'Confirmée':'s3','Assignée livreur':'s4','En livraison':'s5',
  'Livrée ✓':'s6','Refusée':'s7','Annulée':'s8',
};
const MOTIFS_ANN = ['Client injoignable (3 tentatives)',"Client a changé d'avis",'Doublon','Mauvais numéro','Prix refusé','Délai trop long','Autre'];
const MOTIFS_REF = ['Client absent','Client nie avoir commandé','Adresse introuvable','Client refuse de payer','Produit endommagé','Mauvais produit livré','Autre'];

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function badge(s) { return `<span class="st ${ST_MAP[s]||'s8'}">${esc(s)}</span>`; }
function toast(msg,dur=3000) {
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),dur);
}
function openModal(html) {
  document.getElementById('mct').innerHTML=`<div class="mbg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="mh"></div>${html}</div></div>`;
}
function closeModal(){document.getElementById('mct').innerHTML='';}
function setSyncStatus(s) {
  const d=document.getElementById('sdot');
  if(!d)return;
  d.className='sync-dot'+(s==='load'?' load':s==='err'?' err':'');
}

// Mise à jour locale + Make webhook
function localUpdate(id, changes) {
  const o=orders.find(x=>x.id===id);
  if(o) Object.assign(o,changes);
  saveLocal(); render();
}
async function updateStatut(id,statut,motif='') {
  localUpdate(id,{statut,motif});
  await writeToSheet({action:'UPDATE_STATUT',cmdId:id,statut,motif});
}
async function assignCloseur(id,nom) {
  localUpdate(id,{closeur:nom,statut:'Assignée closeur'});
  await writeToSheet({action:'ASSIGN_CLOSEUR',cmdId:id,closeurNom:nom});
}
async function assignLivreur(id,nom) {
  localUpdate(id,{livreur:nom,statut:'Assignée livreur'});
  await writeToSheet({action:'ASSIGN_LIVREUR',cmdId:id,livreurNom:nom});
}

// ══════════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════════
const TABS = {
  admin:[
    {id:'dashboard',l:'📊 Dashboard'},
    {id:'commandes',l:'📋 Commandes'},
    {id:'closeurs_p',l:'📞 Closeurs'},
    {id:'livreurs_p',l:'🚚 Livreurs'},
    {id:'motifs',l:'📉 Motifs'},
    {id:'nouveau',l:'➕ Nouveau'},

function rClPerf() {

  return `<div class="card"><div class="ch">📞 Performance closeurs</div>

        const c=orders.filter(o=>o.closeur===cl&&['Confirmée','Assignée livreur','En livraison','Livrée ✓'].includes(o.statut)).length;
        const ann=orders.filter(o=>o.closeur===cl&&o.statut==='Annulée').length;
        const ca=orders.filter(o=>o.closeur===cl&&o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte,0);

// ══════════════════════════════════════════════════════════════
//  MOTIFS
// ══════════════════════════════════════════════════════════════
function rMotifs() {
  function chart(list,col) {
    if(!list.length) return '<div class="empty">Aucun motif</div>';
    const counts={};
    list.forEach(o=>{if(o.motif)counts[o.motif]=(counts[o.motif]||0)+1;});
    const max=Math.max(...Object.values(counts));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([m,n])=>`
      <div style="margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${esc(m)}</span><strong>${n}</strong></div>
        <div class="bar-bg"><div class="bar" style="width:${Math.round(n/max*100)}%;background:${col}"></div></div>
      </div>`).join('');
  }
  return `
  <div class="card"><div class="ch">✕ Refus <span class="badge" style="background:var(--red2);color:#FCA5A5">${orders.filter(o=>o.statut==='Refusée').length}</span></div>
    <div class="cb">${chart(orders.filter(o=>o.statut==='Refusée'),'var(--red)')}</div></div>
  <div class="card"><div class="ch">✕ Annulations <span class="badge" style="background:rgba(100,100,120,.2);color:#9CA3AF">${orders.filter(o=>o.statut==='Annulée').length}</span></div>
    <div class="cb">${chart(orders.filter(o=>o.statut==='Annulée'),'var(--text2)')}</div></div>
  <div class="card"><div class="ch">📋 Détail</div>
    <div class="tw"><table>
      <tr><th>ID</th><th>Client</th><th>Closeur</th><th>Livreur</th><th>Statut</th><th>Motif</th></tr>
      ${orders.filter(o=>o.motif).map(o=>`<tr>
        <td style="font-size:10px;color:var(--text2)">${esc(o.id)}</td>
        <td>${esc(o.client)}</td><td style="font-size:11px">${esc(o.closeur)||'—'}</td>
        <td style="font-size:11px">${esc(o.livreur)||'—'}</td>
        <td>${badge(o.statut)}</td>
        <td style="font-size:12px;color:#FCA5A5">${esc(o.motif)}</td>
      </tr>`).join('')||'<tr><td colspan="6"><div class="empty">Aucun motif enregistré</div></td></tr>'}
    </table></div></div>`;
}

async function creerCommande() {
  const client=document.getElementById('n_cl')?.value.trim();
  if(!client){toast('⚠️ Nom client requis');return;}
  const prodRaw=(document.getElementById('n_prod')?.value||'').split('|');
  const prodId=prodRaw[0]||'PRD001';
  const prix=parseFloat(prodRaw[1])||20;
  const closeur=document.getElementById('n_clo')?.value||'';
  const pays=document.getElementById('n_pays')?.value||'';
  const ville=document.getElementById('n_ville')?.value||'';
  const qte=parseInt(document.getElementById('n_qte')?.value)||1;
  const src=document.getElementById('n_src')?.value||'';
  const tel=document.getElementById('n_tel')?.value||'';
  const now=new Date().toISOString().split('T')[0];
  const newId='CMD-'+String(orders.length+1).padStart(4,'0');

  const newOrder={
    id:newId,date:now,shopify:'',client,tel,pays,ville,
    produit:prodId,qte,prix,frais:3.5,
    closeur,livreur:'',
    statut:closeur?'Assignée closeur':'En attente',
    motif:'',source:src,_local:true,
  };
  orders.unshift(newOrder);
  saveLocal();

  // Envoi Make.com
  const row=[newId,now,'',client,tel,pays,ville,prodId,qte,'',prix,'',3.5,'',closeur,'','','','',closeur?'Assignée closeur':'En attente','','','',src];
  const ok=await writeToSheet({action:'ADD_COMMANDE',cmdId:newId,data:row,closeurNom:closeur,statut:closeur?'Assignée closeur':'En attente'});

  const msg=document.getElementById('n_msg');
  if(msg) msg.textContent=ok?`✓ ${newId} créée et envoyée au Sheet !`:`✓ ${newId} créée localement (configure Make.com pour la sync automatique)`;
  toast(`✓ Commande ${newId} créée !`);
  setTimeout(()=>switchTab('commandes'),1500);
}

    <div class="cd">📍 ${esc(o.ville)}, ${esc(o.pays)}</div>
    <div class="cod">
      <div><div class="cod-lbl">Valeur commande</div><div class="cod-amt">${fmt(o.prix*o.qte)}</div></div>

async function livRoute(id){await updateStatut(id,'En livraison');toast('🚗 En route');}

// ══════════════════════════════════════════════════════════════
//  HISTORIQUES
// ══════════════════════════════════════════════════════════════
function rHistoClo() {
  const moi=URL_NOM||cfg.closeurs[0]?.nom||'';
  const hist=orders.filter(o=>o.closeur===moi&&['Livrée ✓','Annulée','Refusée'].includes(o.statut));
  const l=hist.filter(o=>o.statut==='Livrée ✓').length;
  return `
  <div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="kpi" style="border-top-color:var(--green)"><div class="kl">Livrées</div><div class="kv">${l}</div></div>
    <div class="kpi" style="border-top-color:var(--text2)"><div class="kl">Annulées</div><div class="kv">${hist.filter(o=>o.statut==='Annulée').length}</div></div>
    <div class="kpi" style="border-top-color:var(--accent)"><div class="kl">Taux confirm.</div><div class="kv">${hist.length>0?Math.round(l/hist.length*100):0}%</div></div>
  </div>
  <div class="card"><div class="ch">🕐 Mon historique</div>
  <div class="tw"><table>
    <tr><th>ID</th><th>Client</th><th>Montant</th><th>Statut</th><th>Motif</th></tr>
    ${hist.map(o=>`<tr>
      <td style="font-size:10px;color:var(--text2)">${esc(o.id)}</td>
      <td>${esc(o.client)}</td>
      <td>${fmt(o.prix*o.qte)}</td>
      <td>${badge(o.statut)}</td>
      <td style="font-size:11px;color:#FCA5A5">${esc(o.motif)||'—'}</td>
    </tr>`).join('')||'<tr><td colspan="5"><div class="empty">Aucun historique</div></td></tr>'}
  </table></div></div>`;
}

function rHistoLiv() {
  const moi=URL_NOM||cfg.livreurs[0]?.nom||'';
  const hist=orders.filter(o=>o.livreur===moi&&['Livrée ✓','Refusée'].includes(o.statut));
  const l=hist.filter(o=>o.statut==='Livrée ✓').length;
  const ca=hist.filter(o=>o.statut==='Livrée ✓').reduce((s,o)=>s+o.prix*o.qte,0);
  return `
  <div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="kpi" style="border-top-color:var(--green)"><div class="kl">Livrées</div><div class="kv">${l}</div></div>
    <div class="kpi" style="border-top-color:var(--red)"><div class="kl">Refusées</div><div class="kv">${hist.length-l}</div></div>
    <div class="kpi" style="border-top-color:var(--accent)"><div class="kl">CA collecté</div><div class="kv">${fmt(ca)}</div></div>
  </div>
  <div class="card"><div class="ch">✓ Mes livraisons terminées</div>
  <div class="tw"><table>
    <tr><th>ID</th><th>Client</th><th>Montant</th><th>Résultat</th><th>Motif</th></tr>
    ${hist.map(o=>`<tr>
      <td style="font-size:10px;color:var(--text2)">${esc(o.id)}</td>
      <td>${esc(o.client)}</td>
      <td><strong>${fmt(o.prix*o.qte)}</strong></td>
      <td>${badge(o.statut)}</td>
      <td style="font-size:11px;color:#FCA5A5">${esc(o.motif)||'—'}</td>
    </tr>`).join('')||'<tr><td colspan="5"><div class="empty">Aucun historique</div></td></tr>'}
  </table></div></div>`;
}

// ══════════════════════════════════════════════════════════════
//  MODALS ADMIN
// ══════════════════════════════════════════════════════════════
function openAssign(id) {
  const o=orders.find(x=>x.id===id);
  const livs=cfg.livreurs.filter(l=>!o.ville||l.ville===o.ville);
  openModal(`
    <h3>✏️ Modifier — ${esc(id)}</h3>
    <p class="msub">${esc(o.client)} · ${esc(o.ville)} · ${badge(o.statut)}</p>
    <div class="fr"><label>Closeur</label>
      <select id="m_clo"><option value="">— Non assigné —</option>
        ${cfg.closeurs.map(c=>`<option ${o.closeur===c.nom?'selected':''}>${c.nom}</option>`).join('')}
      </select></div>
    <div class="fr"><label>Livreur</label>
      <select id="m_liv"><option value="">— Non assigné —</option>
        ${(livs.length?livs:cfg.livreurs).map(l=>`<option ${o.livreur===l.nom?'selected':''}>${l.nom}</option>`).join('')}
      </select></div>
    <div class="fr"><label>Statut</label>
      <select id="m_stat">${Object.keys(ST_MAP).map(s=>`<option ${o.statut===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="mbtns">
      <button class="btn" style="flex:1" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" style="flex:1" onclick="saveAssign('${esc(id)}')">Enregistrer</button>
    </div>`);
}

async function saveAssign(id) {
  const clo=document.getElementById('m_clo')?.value;
  const liv=document.getElementById('m_liv')?.value;
  const sta=document.getElementById('m_stat')?.value;
  const o=orders.find(x=>x.id===id);
  if(clo&&clo!==o.closeur) await assignCloseur(id,clo);
  if(liv&&liv!==o.livreur) await assignLivreur(id,liv);
  if(sta&&sta!==o.statut)  await updateStatut(id,sta,'');
  closeModal(); toast('✓ Mis à jour');
}

function openAssignLiv(id) {
  const o=orders.find(x=>x.id===id);
  const livs=cfg.livreurs.filter(l=>!o.ville||l.ville===o.ville);
  openModal(`
    <h3>🚚 Assigner livreur</h3>
    <p class="msub">${esc(o.client)} · ${esc(o.ville)}</p>
    <div class="fr"><label>Livreur</label>
      <select id="m_liv2">
        ${(livs.length?livs:cfg.livreurs).map(l=>`<option>${l.nom}</option>`).join('')}
      </select></div>
    <div class="mbtns">
      <button class="btn" style="flex:1" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" style="flex:1" onclick="doAssignLiv('${esc(id)}')">Assigner</button>
    </div>`);
}

async function doAssignLiv(id) {
  const lv=document.getElementById('m_liv2')?.value;
  await assignLivreur(id,lv);
  closeModal(); toast(`🚚 Assigné à ${lv}`);
}

function openTL(id) {
  const o=orders.find(x=>x.id===id);
  const steps=[
    {c:'#6C63FF',t:'Commande créée',d:o.date},
    o.closeur&&{c:'#F59E0B',t:'Closeur assigné',d:o.closeur},
    ['Confirmée','Assignée livreur','En livraison','Livrée ✓'].includes(o.statut)&&{c:'#10B981',t:'Confirmée par closeur'},
    o.livreur&&{c:'#F97316',t:'Livreur assigné',d:o.livreur},
    ['En livraison','Livrée ✓'].includes(o.statut)&&{c:'#F59E0B',t:'En cours de livraison'},
    o.statut==='Livrée ✓'&&{c:'#10B981',t:'✓ Livrée — COD collecté'},
    o.motif&&{c:'#EF4444',t:o.statut,d:o.motif},
  ].filter(Boolean);
  openModal(`
    <h3>🕐 Suivi — ${esc(id)}</h3>
    <p class="msub">${esc(o.client)} · ${esc(o.produit)} ×${o.qte} · <strong>${fmt(o.prix*o.qte)}</strong></p>
    <div>
      ${steps.map(s=>`<div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="width:10px;height:10px;border-radius:50%;background:${s.c};flex-shrink:0;margin-top:3px"></div>
        <div style="font-size:12px;color:var(--text2)"><strong style="color:var(--text)">${esc(s.t)}</strong>${s.d?`<br>${esc(s.d)}`:''}</div>
      </div>`).join('')}
    </div>
    <div style="text-align:center;margin:8px 0">${badge(o.statut)}</div>
    ${o.motif?`<div style="background:var(--red2);border-radius:var(--rs);padding:8px 10px;font-size:12px;color:#FCA5A5;margin-top:6px"><strong style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;opacity:.7">Motif</strong>${esc(o.motif)}</div>`:''}
    <div class="mbtns"><button class="btn" style="flex:1" onclick="closeModal()">Fermer</button></div>`);
}

// ══════════════════════════════════════════════════════════════
//  MODAL MOTIF
// ══════════════════════════════════════════════════════════════
function openMotif(type,id) {
  const o=orders.find(x=>x.id===id);
  const motifs=type==='ann'?MOTIFS_ANN:MOTIFS_REF;
  openModal(`
    <h3>${type==='ann'?'✕ Annuler':'✕ Marquer refusée'}</h3>
    <p class="msub">${esc(o.id)} — ${esc(o.client)}</p>
    <div class="mopts">
      ${motifs.map(m=>`<button class="mopt" onclick="selMotif(this,'${esc(m)}')">${esc(m)}</button>`).join('')}
    </div>
    <div class="fr" id="autre-row" style="display:none">
      <label>Préciser</label>
      <textarea id="m-autre" placeholder="Décrivez..."></textarea>
    </div>
    <div class="fr">
      <label>Commentaire (optionnel)</label>
      <textarea id="m-comment" placeholder="Infos supplémentaires..." style="min-height:54px"></textarea>
    </div>
    <div class="mbtns">
      <button class="btn" style="flex:1" onclick="closeModal()">Retour</button>
      <button class="btn btn-d" style="flex:1" onclick="submitMotif('${type}','${esc(id)}')">Enregistrer</button>
    </div>`);
}

function selMotif(btn,val) {
  document.querySelectorAll('.mopt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); btn.dataset.val=val;
  const ar=document.getElementById('autre-row');
  if(ar) ar.style.display=val==='Autre'?'block':'none';
}

async function submitMotif(type,id) {
  const sel=document.querySelector('.mopt.sel');
  if(!sel){toast('⚠️ Choisis un motif');return;}
  const base=sel.dataset.val;
  const autre=document.getElementById('m-autre')?.value||'';
  const comment=document.getElementById('m-comment')?.value||'';
  const motif=(base==='Autre'?autre||'Autre':base)+(comment?` — ${comment}`:'');
  const statut=type==='ann'?'Annulée':'Refusée';
  await updateStatut(id,statut,motif);
  closeModal(); toast(`${statut} — motif enregistré`);
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
async function init() {
  // Devise
  document.getElementById('cur-lbl').textContent = curCode;

  // Rôle via URL
  if(URL_ROLE&&['closeur','livreur'].includes(URL_ROLE)) {
    role=URL_ROLE;
    tab=role==='closeur'?'mes_cmd':'mes_liv';
    document.getElementById('rbar').style.display='none';
  }

  // 1. Données locales immédiatement
  const local=loadLocal();
  if(local.length>0) { orders=local; render(); }

  // 2. Config depuis Sheet
  setSyncStatus('load');
  try {
    cfg=await loadConfig();
    console.log(`✅ Config: ${cfg.produits.length} produits | ${cfg.closeurs.length} closeurs | ${cfg.livreurs.length} livreurs`);
  } catch(e) { console.error('Config error:',e.message); }

  // 3. Commandes depuis Sheet
  try {
    const sheetOrders=await loadOrders();
    const sheetIds=new Set(sheetOrders.map(x=>x.id));
    const localOnly=orders.filter(x=>x._local&&!sheetIds.has(x.id));
    orders=[...localOnly,...sheetOrders];
    saveLocal();
    setSyncStatus('ok');
    console.log(`✅ ${orders.length} commandes (${sheetOrders.length} Sheet + ${localOnly.length} local)`);
  } catch(e) {
    setSyncStatus('err');
    console.error('Orders error:',e.message);
  }

  render();

  // 4. Rafraîchissement auto toutes les 60s
  setInterval(async()=>{
    try {
      const [so,c]=await Promise.all([loadOrders(),loadConfig()]);
      const sids=new Set(so.map(x=>x.id));
      const loc=orders.filter(x=>x._local&&!sids.has(x.id));
      orders=[...loc,...so]; cfg=c;
      saveLocal(); setSyncStatus('ok'); render();
    } catch(e){ setSyncStatus('err'); }
  },60000);
}

init();
</script>
